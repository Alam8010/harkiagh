<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orders — Harkiagh</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --green:#00E676;--green-dark:#00C853;--dark:#0A0A0A;--dark2:#111111;--dark3:#1A1A1A;--border:rgba(255,255,255,0.07);--gray:#888888;--white:#FFFFFF;--danger:#FF3B3B;--warning:#FFB300;--info:#2979FF; }
    html, body { min-height:100%; background:var(--dark); color:var(--white); font-family:'Barlow',sans-serif; }
    .mobile-bar { display:none; position:fixed; top:0; left:0; right:0; height:56px; background:var(--dark2); border-bottom:1px solid var(--border); padding:0 16px; align-items:center; justify-content:space-between; z-index:200; }
    .mobile-logo { display:flex; align-items:center; gap:8px; }
    .mobile-logo-icon { width:28px; height:28px; background:var(--green); border-radius:6px; display:flex; align-items:center; justify-content:center; }
    .mobile-logo-icon svg { width:16px; height:16px; fill:var(--dark); }
    .mobile-logo-text { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; }
    .mobile-logo-text span { color:var(--green); }
    .mobile-menu-btn { background:transparent; border:1px solid var(--border); color:var(--white); border-radius:8px; padding:6px 12px; font-size:18px; cursor:pointer; }
    .mobile-menu { display:none; position:fixed; top:56px; left:0; right:0; background:var(--dark2); border-bottom:1px solid var(--border); flex-direction:column; z-index:199; padding:8px 0; }
    .mobile-menu.open { display:flex; }
    .mobile-menu a, .mobile-menu button { padding:14px 20px; color:rgba(255,255,255,0.7); text-decoration:none; font-size:15px; font-weight:500; border:none; background:transparent; text-align:left; cursor:pointer; font-family:'Barlow',sans-serif; border-bottom:1px solid rgba(255,255,255,0.04); }
    .mobile-menu button { color:var(--danger); }
    @media (max-width:900px) { .mobile-bar{display:flex;} .sidebar{display:none;} .main{margin-left:0;margin-top:56px;} }
    .sidebar { position:fixed; left:0; top:0; bottom:0; width:220px; background:var(--dark2); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:100; }
    .sidebar-logo { padding:24px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-icon { width:32px; height:32px; background:var(--green); border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .logo-icon svg { width:18px; height:18px; fill:var(--dark); }
    .logo-text { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; }
    .logo-text span { color:var(--green); }
    .nav-section { padding:20px 12px; flex:1; }
    .nav-label { font-size:10px; font-weight:600; color:rgba(255,255,255,0.25); letter-spacing:2px; text-transform:uppercase; padding:0 8px; margin-bottom:8px; margin-top:16px; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; color:rgba(255,255,255,0.5); font-size:14px; font-weight:500; cursor:pointer; transition:all 0.15s; text-decoration:none; margin-bottom:2px; }
    .nav-item:hover { background:rgba(255,255,255,0.05); color:var(--white); }
    .nav-item.active { background:rgba(0,230,118,0.1); color:var(--green); }
    .nav-item svg { width:16px; height:16px; fill:currentColor; flex-shrink:0; }
    .sidebar-bottom { padding:16px 12px; border-top:1px solid var(--border); }
    .user-info { display:flex; align-items:center; gap:10px; padding:10px 12px; margin-bottom:8px; }
    .user-avatar { width:32px; height:32px; background:rgba(0,230,118,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:var(--green); flex-shrink:0; }
    .user-name { font-size:13px; font-weight:500; color:var(--white); }
    .user-role { font-size:11px; color:var(--gray); }
    .logout-btn { width:100%; padding:9px 12px; background:transparent; border:1px solid rgba(255,59,59,0.2); border-radius:8px; color:rgba(255,59,59,0.7); font-family:'Barlow',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:6px; }
    .logout-btn:hover { background:rgba(255,59,59,0.08); color:var(--danger); }
    .main { margin-left:220px; min-height:100vh; }
    .topbar { height:64px; background:var(--dark2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 32px; position:sticky; top:0; z-index:50; }
    .page-title { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .page-sub { font-size:12px; color:var(--gray); }
    .page-body { padding:28px 32px; }
    @media (max-width:900px) { .page-body{padding:16px;} .topbar{padding:0 16px;} }

    .stats-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:24px; }
    .stat-card { background:var(--dark2); border:1px solid var(--border); border-radius:10px; padding:14px 16px; cursor:pointer; transition:border-color 0.15s; }
    .stat-card:hover { border-color:rgba(255,255,255,0.15); }
    .stat-card.active-filter { border-color:var(--green); }
    .stat-val { font-family:'Bebas Neue',sans-serif; font-size:24px; line-height:1; margin-bottom:4px; }
    .stat-label { font-size:11px; color:var(--gray); }

    .filter-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .search-box { flex:1; min-width:200px; display:flex; align-items:center; gap:10px; background:var(--dark2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; }
    .search-box svg { width:16px; height:16px; fill:var(--gray); flex-shrink:0; }
    .search-box input { background:transparent; border:none; outline:none; color:var(--white); font-family:'Barlow',sans-serif; font-size:14px; width:100%; }
    .search-box input::placeholder { color:var(--gray); }

    .orders-card { background:var(--dark2); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .orders-table { width:100%; border-collapse:collapse; }
    .orders-table th { text-align:left; padding:12px 20px; font-size:11px; font-weight:600; color:var(--gray); letter-spacing:1px; text-transform:uppercase; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.02); }
    .orders-table td { padding:14px 20px; font-size:13px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; }
    .orders-table tr:last-child td { border-bottom:none; }
    .orders-table tr:hover td { background:rgba(255,255,255,0.015); }

    .badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:100px; font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }
    .badge.pending { background:rgba(255,179,0,0.1); color:var(--warning); border:1px solid rgba(255,179,0,0.2); }
    .badge.confirmed { background:rgba(41,121,255,0.1); color:var(--info); border:1px solid rgba(41,121,255,0.2); }
    .badge.processing { background:rgba(156,39,176,0.1); color:#CE93D8; border:1px solid rgba(156,39,176,0.2); }
    .badge.delivered { background:rgba(0,230,118,0.1); color:var(--green); border:1px solid rgba(0,230,118,0.2); }
    .badge.cancelled { background:rgba(255,59,59,0.1); color:var(--danger); border:1px solid rgba(255,59,59,0.2); }

    .status-select { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:var(--white); font-family:'Barlow',sans-serif; font-size:12px; padding:5px 8px; cursor:pointer; outline:none; }
    .status-select option { background:var(--dark2); }

    .order-id-cell { font-size:11px; color:var(--gray); font-family:monospace; }
    .customer-name { font-weight:500; margin-bottom:2px; }
    .customer-phone { font-size:11px; color:var(--green); }
    .customer-address { font-size:11px; color:var(--gray); margin-top:2px; max-width:180px; }
    .amount { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--green); }
    .order-date { font-size:11px; color:var(--gray); }
    .view-items-btn { padding:5px 12px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:6px; color:var(--white); font-size:11px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .view-items-btn:hover { background:rgba(255,255,255,0.1); }

    .empty-table { text-align:center; padding:60px 20px; color:var(--gray); font-size:14px; }

    /* ORDER DETAIL MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:300; display:none; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--dark2); border:1px solid var(--border); border-radius:16px; width:100%; max-width:500px; overflow:hidden; max-height:90vh; overflow-y:auto; }
    .modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--dark2); z-index:1; }
    .modal-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .modal-close { width:32px; height:32px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--gray); font-size:18px; }
    .modal-close:hover { color:var(--white); }
    .modal-body { padding:24px; }
    .detail-section { margin-bottom:20px; }
    .detail-label { font-size:11px; font-weight:600; color:rgba(255,255,255,0.4); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .detail-item label { display:block; font-size:11px; color:var(--gray); margin-bottom:3px; }
    .detail-item span { font-size:14px; font-weight:500; }
    .detail-address { font-size:14px; line-height:1.6; }
    .items-list { display:flex; flex-direction:column; gap:10px; }
    .item-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:rgba(255,255,255,0.03); border-radius:8px; }
    .item-row-left { font-size:13px; }
    .item-row-qty { font-size:11px; color:var(--gray); margin-top:2px; }
    .item-row-price { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--green); }
    .total-row { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border-top:1px solid var(--border); margin-top:8px; }
    .total-label { font-size:13px; font-weight:600; }
    .total-val { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--green); }

    #loading { position:fixed; inset:0; background:var(--dark); display:flex; align-items:center; justify-content:center; z-index:999; }
    .spinner { width:32px; height:32px; border:2px solid rgba(255,255,255,0.1); border-top-color:var(--green); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    @media (max-width:900px) { .stats-grid{grid-template-columns:repeat(3,1fr);} .orders-card{overflow-x:auto;} .orders-table{min-width:650px;} }
    @media (max-width:480px) { .stats-grid{grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>

<div class="mobile-bar">
  <div class="mobile-logo">
    <div class="mobile-logo-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg></div>
    <span class="mobile-logo-text">HARKI<span>AGH</span></span>
  </div>
  <button class="mobile-menu-btn" onclick="document.getElementById('mobile-menu').classList.toggle('open')">☰</button>
</div>
<div class="mobile-menu" id="mobile-menu">
  <a href="dashboard.html">Dashboard</a>
  <a href="products.html">Products</a>
  <a href="orders.html">Orders</a>
  <a href="store-setup.html">Store Settings</a>
  <button onclick="logout()">Logout</button>
</div>

<div class="sidebar">
  <a class="sidebar-logo" href="../index.html">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg></div>
    <span class="logo-text">HARKI<span>AGH</span></span>
  </a>
  <div class="nav-section">
    <div class="nav-label">Store</div>
    <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>Dashboard</a>
    <a class="nav-item" href="products.html"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>Products</a>
    <a class="nav-item active" href="orders.html"><svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>Orders</a>
    <div class="nav-label">Settings</div>
    <a class="nav-item" href="store-setup.html"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>Store Settings</a>
  </div>
  <div class="sidebar-bottom">
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">?</div>
      <div><div class="user-name" id="user-name">Loading...</div><div class="user-role">Store Owner</div></div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title">Orders</div>
      <div class="page-sub">Manage customer orders</div>
    </div>
  </div>

  <div class="page-body">
    <div class="stats-grid">
      <div class="stat-card active-filter" id="filter-all" onclick="setFilter('all')">
        <div class="stat-val" id="count-all">0</div>
        <div class="stat-label">All Orders</div>
      </div>
      <div class="stat-card" id="filter-pending" onclick="setFilter('pending')">
        <div class="stat-val" id="count-pending" style="color:var(--warning)">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card" id="filter-confirmed" onclick="setFilter('confirmed')">
        <div class="stat-val" id="count-confirmed" style="color:var(--info)">0</div>
        <div class="stat-label">Confirmed</div>
      </div>
      <div class="stat-card" id="filter-processing" onclick="setFilter('processing')">
        <div class="stat-val" id="count-processing" style="color:#CE93D8">0</div>
        <div class="stat-label">Processing</div>
      </div>
      <div class="stat-card" id="filter-delivered" onclick="setFilter('delivered')">
        <div class="stat-val" id="count-delivered" style="color:var(--green)">0</div>
        <div class="stat-label">Delivered</div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="search-input" placeholder="Search by name or phone..." oninput="renderOrders()" />
      </div>
    </div>

    <div class="orders-card">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Address</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Status</th>
            <th>Items</th>
          </tr>
        </thead>
        <tbody id="orders-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="order-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="order-modal-title">Order Details</div>
      <div class="modal-close" onclick="document.getElementById('order-modal').classList.remove('open')">×</div>
    </div>
    <div class="modal-body" id="order-modal-body"></div>
  </div>
</div>

<script src="../js/supabase.js"></script>
<script>
  let storeId = null;
  let allOrders = [];
  let activeFilter = 'all';

  async function init() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) { window.location.href = '../index.html'; return; }
    const user = session.user;
    const name = user.user_metadata?.full_name || user.email;
    document.getElementById('user-name').textContent = name;
    document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();

    const { data: store } = await _supabase.from('stores').select('id').eq('owner_id', user.id).single();
    if (!store) { window.location.href = 'store-setup.html'; return; }
    storeId = store.id;

    await loadOrders();
    document.getElementById('loading').style.display = 'none';
  }

  async function loadOrders() {
    const { data } = await _supabase.from('orders').select('*, order_items(*)').eq('store_id', storeId).order('created_at', { ascending: false });
    allOrders = data || [];

    document.getElementById('count-all').textContent = allOrders.length;
    document.getElementById('count-pending').textContent = allOrders.filter(o => o.status === 'pending').length;
    document.getElementById('count-confirmed').textContent = allOrders.filter(o => o.status === 'confirmed').length;
    document.getElementById('count-processing').textContent = allOrders.filter(o => o.status === 'processing').length;
    document.getElementById('count-delivered').textContent = allOrders.filter(o => o.status === 'delivered').length;

    renderOrders();
  }

  function setFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter'));
    document.getElementById(`filter-${filter}`).classList.add('active-filter');
    renderOrders();
  }

  function renderOrders() {
    const q = document.getElementById('search-input').value.toLowerCase();
    let filtered = allOrders;
    if (activeFilter !== 'all') filtered = filtered.filter(o => o.status === activeFilter);
    if (q) filtered = filtered.filter(o =>
      o.customer_name.toLowerCase().includes(q) ||
      o.customer_phone.toLowerCase().includes(q) ||
      o.id.toLowerCase().includes(q)
    );

    const tbody = document.getElementById('orders-body');
    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-table">No orders found.</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(o => `
      <tr>
        <td class="order-id-cell">#${o.id.slice(0,8).toUpperCase()}</td>
        <td>
          <div class="customer-name">${o.customer_name}</div>
          <div class="customer-phone">${o.customer_phone}</div>
        </td>
        <td><div class="customer-address">${o.customer_address}</div></td>
        <td><div class="amount">PKR ${Number(o.total_amount).toLocaleString()}</div></td>
        <td><div class="order-date">${new Date(o.created_at).toLocaleDateString('en-PK', { day:'numeric', month:'short', year:'numeric' })}</div></td>
        <td>
          <select class="status-select" onchange="updateStatus('${o.id}', this.value)">
            <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
            <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
            <option value="processing" ${o.status==='processing'?'selected':''}>Processing</option>
            <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
            <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
          </select>
        </td>
        <td><button class="view-items-btn" onclick="viewOrderItems('${o.id}')">View Items</button></td>
      </tr>
    `).join('');
  }

  async function updateStatus(orderId, status) {
    await _supabase.from('orders').update({ status }).eq('id', orderId);
    const order = allOrders.find(o => o.id === orderId);
    if (order) order.status = status;
    document.getElementById('count-pending').textContent = allOrders.filter(o => o.status === 'pending').length;
    document.getElementById('count-confirmed').textContent = allOrders.filter(o => o.status === 'confirmed').length;
    document.getElementById('count-processing').textContent = allOrders.filter(o => o.status === 'processing').length;
    document.getElementById('count-delivered').textContent = allOrders.filter(o => o.status === 'delivered').length;
  }

  function viewOrderItems(orderId) {
    const order = allOrders.find(o => o.id === orderId);
    if (!order) return;
    const items = order.order_items || [];
    const total = Number(order.total_amount);

    document.getElementById('order-modal-title').textContent = `Order #${order.id.slice(0,8).toUpperCase()}`;
    document.getElementById('order-modal-body').innerHTML = `
      <div class="detail-section">
        <div class="detail-label">Customer Details</div>
        <div class="detail-grid">
          <div class="detail-item"><label>Name</label><span>${order.customer_name}</span></div>
          <div class="detail-item"><label>Phone</label><span style="color:var(--green)">${order.customer_phone}</span></div>
        </div>
        <div style="margin-top:12px"><div class="detail-item"><label>Delivery Address</label><div class="detail-address">${order.customer_address}</div></div></div>
        ${order.notes ? `<div style="margin-top:12px"><div class="detail-item"><label>Notes</label><div class="detail-address" style="color:var(--gray)">${order.notes}</div></div></div>` : ''}
      </div>
      <div class="detail-section">
        <div class="detail-label">Order Items</div>
        <div class="items-list">
          ${items.map(item => `
            <div class="item-row">
              <div class="item-row-left">
                <div>${item.product_name}</div>
                <div class="item-row-qty">Qty: ${item.quantity} × PKR ${Number(item.product_price).toLocaleString()}</div>
              </div>
              <div class="item-row-price">PKR ${Number(item.subtotal).toLocaleString()}</div>
            </div>
          `).join('')}
          <div class="total-row">
            <div class="total-label">Total</div>
            <div class="total-val">PKR ${total.toLocaleString()}</div>
          </div>
        </div>
      </div>
    `;
    document.getElementById('order-modal').classList.add('open');
  }

  async function logout() {
    await _supabase.auth.signOut();
    window.location.href = '../index.html';
  }

  init();
</script>
</body>
</html>
