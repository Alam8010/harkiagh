<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore Products — Sabhai</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00E676; --green-dark: #00C853;
      --dark: #0A0A0A; --dark2: #111111; --dark3: #1A1A1A;
      --border: rgba(255,255,255,0.07); --gray: #888888; --white: #FFFFFF; --danger: #FF3B3B;
    }
    html, body { min-height: 100%; background: var(--dark); color: var(--white); font-family: 'Barlow', sans-serif; overflow-x: hidden; }

    /* NAVBAR */
    .navbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { width: 32px; height: 32px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 18px; height: 18px; fill: var(--dark); }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--white); }
    .logo-text span { color: var(--green); }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-btn { padding: 8px 16px; border-radius: 8px; font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.15s; }
    .nav-btn.outline { background: transparent; border: 1px solid var(--border); color: var(--white); }
    .nav-btn.outline:hover { background: rgba(255,255,255,0.06); }
    .nav-btn.primary { background: var(--green); border: none; color: var(--dark); font-weight: 600; }
    .nav-btn.primary:hover { background: var(--green-dark); }
    .nav-username { font-size: 14px; color: var(--gray); }

    /* LAYOUT */
    .page-layout { display: flex; min-height: calc(100vh - 65px); }

    /* SIDEBAR */
    .sidebar { width: 260px; min-width: 260px; background: var(--dark2); border-right: 1px solid var(--border); padding: 24px 20px; position: sticky; top: 65px; height: calc(100vh - 65px); overflow-y: auto; }
    .sidebar-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--gray); margin-bottom: 16px; }
    .sidebar-store-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; text-decoration: none; color: var(--white); transition: background 0.15s; margin-bottom: 4px; }
    .sidebar-store-link:hover { background: rgba(255,255,255,0.05); }
    .sidebar-store-logo { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; background: var(--dark3); border: 1px solid var(--border); flex-shrink: 0; }
    .sidebar-store-logo-placeholder { width: 36px; height: 36px; border-radius: 8px; background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--green); }
    .sidebar-store-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-store-count { font-size: 11px; color: var(--gray); }
    .sidebar-divider { height: 1px; background: var(--border); margin: 16px 0; }
    .sidebar-all-stores { display: block; width: 100%; padding: 10px 12px; background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2); border-radius: 10px; color: var(--green); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-align: center; text-decoration: none; transition: all 0.15s; }
    .sidebar-all-stores:hover { background: rgba(0,230,118,0.15); }

    /* MAIN CONTENT */
    .main { flex: 1; padding: 28px 28px; overflow-x: hidden; }
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; }
    .page-header p { font-size: 14px; color: var(--gray); margin-top: 4px; }

    /* FILTER ROW */
    .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 10px; background: var(--dark2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
    .search-box svg { width: 16px; height: 16px; fill: var(--gray); flex-shrink: 0; }
    .search-box input { background: transparent; border: none; outline: none; color: var(--white); font-family: 'Barlow', sans-serif; font-size: 14px; width: 100%; }
    .search-box input::placeholder { color: var(--gray); }
    .cat-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .cat-pill { padding: 8px 16px; background: var(--dark2); border: 1px solid var(--border); border-radius: 100px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: var(--gray); }
    .cat-pill:hover { color: var(--white); border-color: rgba(255,255,255,0.15); }
    .cat-pill.active { background: rgba(0,230,118,0.1); border-color: rgba(0,230,118,0.3); color: var(--green); }

    /* PRODUCTS GRID */
    .products-meta { font-size: 13px; color: var(--gray); margin-bottom: 16px; }
    .products-meta span { color: var(--green); font-weight: 600; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .product-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
    .product-card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-3px); }
    .product-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--dark3); display: block; }
    .product-img-placeholder { width: 100%; aspect-ratio: 1; background: var(--dark3); display: flex; align-items: center; justify-content: center; }
    .product-img-placeholder svg { width: 40px; height: 40px; fill: rgba(255,255,255,0.1); }
    .product-info { padding: 12px; }
    .product-store { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .product-store-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .product-store-name { font-size: 11px; color: var(--green); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-cat { font-size: 11px; color: var(--gray); margin-bottom: 8px; }
    .product-price { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--white); }
    .out-of-stock { opacity: 0.5; }
    .out-of-stock-badge { display: inline-block; background: rgba(255,59,59,0.15); border: 1px solid rgba(255,59,59,0.3); color: var(--danger); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }

    /* EMPTY */
    .empty { text-align: center; padding: 80px 20px; color: var(--gray); }
    .empty-icon { width: 64px; height: 64px; background: rgba(255,255,255,0.04); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .empty-icon svg { width: 32px; height: 32px; fill: var(--gray); }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--white); margin-bottom: 8px; }

    /* LOADING */
    .loading { text-align: center; padding: 80px 20px; color: var(--gray); font-size: 14px; }

    /* MOBILE */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .navbar { padding: 14px 20px; }
      .main { padding: 20px 16px; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .mobile-stores-btn { display: flex; }
    }
    .mobile-stores-btn { display: none; align-items: center; gap: 6px; padding: 8px 14px; background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2); border-radius: 8px; color: var(--green); font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 16px; }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="../index.html">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg></div>
    <span class="logo-text">SAB<span>HAI</span></span>
  </a>
  <div class="nav-right" id="nav-right">
    <a class="nav-btn outline" href="#" onclick="openAuthModal('login')">Login</a>
    <a class="nav-btn primary" href="#" onclick="openAuthModal('signup')">Sign Up</a>
  </div>
  <div class="nav-right" id="nav-user" style="display:none">
    <span class="nav-username" id="nav-username"></span>
    <a class="nav-btn outline" href="#" onclick="handleLogout()">Logout</a>
  </div>
</nav>

<div class="page-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">Explore Stores</div>
    <div id="sidebar-stores"><div style="color:var(--gray);font-size:13px">Loading...</div></div>
    <div class="sidebar-divider"></div>
    <a class="sidebar-all-stores" href="stores.html">View All Stores →</a>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <h1>All Products</h1>
      <p>Browsing everything from all stores — newest first</p>
    </div>

    <a class="mobile-stores-btn" href="stores.html">🏪 Explore Stores</a>

    <div class="filter-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="Search products..." oninput="filterProducts()" id="search-input" />
      </div>
      <div class="cat-pills" id="cat-pills">
        <div class="cat-pill active" onclick="setCat('')">All</div>
      </div>
    </div>

    <div class="products-meta" id="products-meta"></div>
    <div id="products-container"><div class="loading">Loading products...</div></div>
  </main>
</div>

<!-- AUTH MODAL -->
<div style="position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)" id="auth-modal">
  <div style="background:var(--dark2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:400px;overflow:hidden">
    <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;text-transform:uppercase" id="auth-modal-title">Login</div>
      <div onclick="closeAuthModal()" style="width:32px;height:32px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);font-size:18px">×</div>
    </div>
    <div style="padding:24px">
      <div style="padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:14px;display:none" id="auth-msg"></div>
      <div id="login-fields">
        <div style="margin-bottom:16px"><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Email</label><input type="email" id="auth-email" placeholder="your@email.com" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--white);outline:none"/></div>
        <div style="margin-bottom:16px"><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Password</label><input type="password" id="auth-password" placeholder="••••••••" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--white);outline:none"/></div>
      </div>
      <div id="signup-fields" style="display:none">
        <div style="margin-bottom:16px"><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Full Name</label><input type="text" id="auth-name" placeholder="Ahmed Khan" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--white);outline:none"/></div>
        <div style="margin-bottom:16px"><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Email</label><input type="email" id="auth-email2" placeholder="your@email.com" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--white);outline:none"/></div>
        <div style="margin-bottom:16px"><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Password</label><input type="password" id="auth-password2" placeholder="min 6 characters" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--white);outline:none"/></div>
        <div style="margin-bottom:16px"><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Phone (optional)</label><input type="text" id="auth-phone" placeholder="03XX-XXXXXXX" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--white);outline:none"/></div>
      </div>
    </div>
    <div style="padding:16px 24px;border-top:1px solid var(--border)">
      <button onclick="handleAuth()" id="auth-submit-btn" style="width:100%;padding:13px;background:var(--green);color:var(--dark);border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer">Login</button>
    </div>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const _supabase = createClient(
    'https://vlpozudvefnkkhvtjswi.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZscG96dWR2ZWZua2todnRqc3dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzgxNDAsImV4cCI6MjA5MDI1NDE0MH0.0hRczlsHkDWcsJXGFA-HHRTZcYxsgy_ARhx6EAlN8T8'
  );

  let allProducts = [];
  let selectedCategory = '';
  let authMode = 'login';

  async function init() {
    await checkAuth();
    await loadData();
  }

  async function loadData() {
    // Load products from all active stores, newest first
    const { data: products } = await _supabase
      .from('products')
      .select('*, stores(id, name, logo_url, slug)')
      .eq('is_available', true)
      .order('created_at', { ascending: false });

    allProducts = products || [];
    buildCategoryPills();
    renderProducts(allProducts);
    loadSidebarStores();
  }

  function buildCategoryPills() {
    const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
    const container = document.getElementById('cat-pills');
    container.innerHTML = `<div class="cat-pill active" onclick="setCat('')">All</div>` +
      cats.map(c => `<div class="cat-pill" onclick="setCat('${c}')">${c}</div>`).join('');
  }

  function setCat(cat) {
    selectedCategory = cat;
    document.querySelectorAll('.cat-pill').forEach(p => {
      p.classList.toggle('active', p.textContent === (cat || 'All'));
    });
    filterProducts();
  }

  function filterProducts() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const filtered = allProducts.filter(p => {
      const matchCat = !selectedCategory || p.category === selectedCategory;
      const matchSearch = p.name.toLowerCase().includes(search) || (p.description || '').toLowerCase().includes(search);
      return matchCat && matchSearch;
    });
    renderProducts(filtered);
  }

  function renderProducts(products) {
    const container = document.getElementById('products-container');
    const meta = document.getElementById('products-meta');
    meta.innerHTML = `Showing <span>${products.length}</span> product${products.length !== 1 ? 's' : ''}`;

    if (products.length === 0) {
      container.innerHTML = `<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M19 5H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-7 9l-4-4 1.41-1.41L12 11.17l6.59-6.58L20 6l-8 8z"/></svg></div><div class="empty-title">No products found</div></div>`;
      return;
    }

    container.innerHTML = `<div class="products-grid">${products.map(p => {
      const store = p.stores;
      const storeUrl = store ? `store-public.html?store=${store.slug}` : '#';
      const inStock = p.is_available && p.stock_qty > 0;
      return `
        <div class="product-card ${!inStock ? 'out-of-stock' : ''}" onclick="window.location.href='${storeUrl}'">
          ${p.image_url
            ? `<img class="product-img" src="${p.image_url}" alt="${p.name}" loading="lazy"/>`
            : `<div class="product-img-placeholder"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></div>`
          }
          <div class="product-info">
            ${store ? `<div class="product-store"><div class="product-store-dot"></div><div class="product-store-name">${store.name}</div></div>` : ''}
            ${!inStock ? `<div class="out-of-stock-badge">Out of Stock</div>` : ''}
            <div class="product-name">${p.name}</div>
            <div class="product-cat">${p.category || 'General'}</div>
            <div class="product-price">PKR ${p.price.toLocaleString('en-PK')}</div>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  async function loadSidebarStores() {
    const { data: stores } = await _supabase
      .from('stores')
      .select('id, name, logo_url, slug')
      .eq('is_active', true)
      .order('created_at', { ascending: false })
      .limit(10);

    const container = document.getElementById('sidebar-stores');
    if (!stores || stores.length === 0) {
      container.innerHTML = `<div style="color:var(--gray);font-size:13px">No stores yet</div>`;
      return;
    }

    container.innerHTML = stores.map(s => {
      const initial = s.name.charAt(0).toUpperCase();
      const logoHtml = s.logo_url
        ? `<img class="sidebar-store-logo" src="${s.logo_url}" alt="${s.name}"/>`
        : `<div class="sidebar-store-logo-placeholder">${initial}</div>`;
      return `<a class="sidebar-store-link" href="store-public.html?store=${s.slug}">${logoHtml}<div><div class="sidebar-store-name">${s.name}</div></div></a>`;
    }).join('');
  }

  async function checkAuth() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
      const name = session.user.user_metadata?.full_name || session.user.email;
      document.getElementById('nav-right').style.display = 'none';
      document.getElementById('nav-user').style.display = 'flex';
      document.getElementById('nav-username').textContent = name;
    } else {
      document.getElementById('nav-right').style.display = 'flex';
      document.getElementById('nav-user').style.display = 'none';
    }
  }

  async function handleLogout() {
    await _supabase.auth.signOut();
    checkAuth();
  }

  function openAuthModal(mode) {
    authMode = mode;
    const isLogin = mode === 'login';
    document.getElementById('auth-modal-title').textContent = isLogin ? 'Login' : 'Sign Up';
    document.getElementById('auth-submit-btn').textContent = isLogin ? 'Login' : 'Create Account';
    document.getElementById('login-fields').style.display = isLogin ? 'block' : 'none';
    document.getElementById('signup-fields').style.display = isLogin ? 'none' : 'block';
    document.getElementById('auth-msg').style.display = 'none';
    document.getElementById('auth-modal').style.display = 'flex';
  }

  function closeAuthModal() {
    document.getElementById('auth-modal').style.display = 'none';
  }

  function showAuthMsg(text, type) {
    const el = document.getElementById('auth-msg');
    el.textContent = text;
    el.style.display = 'block';
    el.style.background = type === 'error' ? 'rgba(255,59,59,0.1)' : 'rgba(0,230,118,0.1)';
    el.style.border = type === 'error' ? '1px solid rgba(255,59,59,0.2)' : '1px solid rgba(0,230,118,0.2)';
    el.style.color = type === 'error' ? 'var(--danger)' : 'var(--green)';
  }

  async function handleAuth() {
    const btn = document.getElementById('auth-submit-btn');
    btn.disabled = true;
    if (authMode === 'login') {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      if (!email || !password) { showAuthMsg('Please fill in all fields.', 'error'); btn.disabled = false; return; }
      const { error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) { showAuthMsg(error.message, 'error'); btn.disabled = false; return; }
      await checkAuth();
      closeAuthModal();
    } else {
      const name = document.getElementById('auth-name').value.trim();
      const email = document.getElementById('auth-email2').value.trim();
      const password = document.getElementById('auth-password2').value;
      const phone = document.getElementById('auth-phone').value.trim();
      if (!name || !email || !password) { showAuthMsg('Name, email and password are required.', 'error'); btn.disabled = false; return; }
      const { data, error } = await _supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
      if (error) { showAuthMsg(error.message, 'error'); btn.disabled = false; return; }
      if (data.user) {
        await _supabase.from('customers').insert({ user_id: data.user.id, full_name: name, phone: phone || null });
        showAuthMsg('Account created! You can now shop.', 'success');
        await checkAuth();
        setTimeout(() => closeAuthModal(), 1500);
      }
    }
    btn.disabled = false;
  }

  init();
</script>
</body>
</html>
