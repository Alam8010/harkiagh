<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Stores — Harkiagh</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green:#00E676;--green-dark:#00C853;--dark:#0A0A0A;--dark2:#111111;--dark3:#1A1A1A;--border:rgba(255,255,255,0.07);--gray:#888888;--white:#FFFFFF;--danger:#FF3B3B; }
    html, body { min-height:100%; background:var(--dark); color:var(--white); font-family:'Barlow',sans-serif; }

    .navbar { height:64px; background:rgba(10,10,10,0.95); border-bottom:1px solid var(--border); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:space-between; padding:0 32px; position:sticky; top:0; z-index:100; }
    .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .nav-logo-icon { width:32px; height:32px; background:var(--green); border-radius:7px; display:flex; align-items:center; justify-content:center; }
    .nav-logo-icon svg { width:18px; height:18px; fill:var(--dark); }
    .nav-logo-text { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--white); }
    .nav-logo-text span { color:var(--green); }
    .nav-right { display:flex; align-items:center; gap:12px; }
    .nav-btn { padding:8px 16px; border-radius:8px; font-family:'Barlow',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; text-decoration:none; display:inline-block; border:none; }
    .nav-btn.outline { background:transparent; border:1px solid var(--border); color:var(--white); }
    .nav-btn.outline:hover { background:rgba(255,255,255,0.06); }
    .nav-btn.primary { background:var(--green); color:var(--dark); font-weight:600; }
    .nav-btn.primary:hover { background:var(--green-dark); }

    .hero-banner { background:linear-gradient(135deg,rgba(0,230,118,0.06) 0%,transparent 60%); border-bottom:1px solid var(--border); padding:48px 32px; text-align:center; }
    .hero-tag { display:inline-flex; align-items:center; gap:8px; background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.2); border-radius:100px; padding:5px 14px; font-size:11px; font-weight:600; color:var(--green); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:16px; }
    .hero-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(36px,5vw,56px); letter-spacing:2px; margin-bottom:12px; }
    .hero-sub { font-size:15px; color:rgba(255,255,255,0.5); max-width:480px; margin:0 auto; line-height:1.6; }

    .page-body { max-width:1200px; margin:0 auto; padding:36px 32px; }
    .filter-row { display:flex; align-items:center; gap:12px; margin-bottom:32px; flex-wrap:wrap; }
    .search-box { flex:1; min-width:200px; display:flex; align-items:center; gap:10px; background:var(--dark2); border:1px solid var(--border); border-radius:8px; padding:11px 14px; }
    .search-box svg { width:16px; height:16px; fill:var(--gray); flex-shrink:0; }
    .search-box input { background:transparent; border:none; outline:none; color:var(--white); font-family:'Barlow',sans-serif; font-size:14px; width:100%; }
    .search-box input::placeholder { color:var(--gray); }

    .stores-meta { font-size:13px; color:var(--gray); margin-bottom:20px; }
    .stores-meta span { color:var(--green); font-weight:600; }

    .stores-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }

    .store-card { background:var(--dark2); border:1px solid var(--border); border-radius:16px; overflow:hidden; transition:border-color 0.15s,transform 0.15s; cursor:pointer; text-decoration:none; display:block; }
    .store-card:hover { border-color:rgba(0,230,118,0.25); transform:translateY(-3px); }
    .store-card-banner { height:100px; background:linear-gradient(135deg,var(--dark3) 0%,rgba(0,230,118,0.05) 100%); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .store-banner-pattern { position:absolute; inset:0; background-image:linear-gradient(rgba(0,230,118,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,118,0.03) 1px,transparent 1px); background-size:20px 20px; }
    .store-logo-wrap { position:absolute; bottom:-24px; left:20px; width:56px; height:56px; border-radius:12px; border:2px solid var(--dark2); overflow:hidden; background:var(--dark3); display:flex; align-items:center; justify-content:center; z-index:1; }
    .store-logo-wrap img { width:100%; height:100%; object-fit:cover; }
    .store-logo-wrap svg { width:28px; height:28px; fill:rgba(255,255,255,0.15); }
    .store-card-body { padding:36px 20px 20px; }
    .store-name { font-size:17px; font-weight:600; margin-bottom:6px; }
    .store-desc { font-size:13px; color:var(--gray); line-height:1.5; margin-bottom:14px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:38px; }
    .store-meta { display:flex; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
    .store-meta-item { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--gray); }
    .store-meta-item svg { width:12px; height:12px; fill:var(--green); flex-shrink:0; }
    .store-card-footer { display:flex; align-items:center; justify-content:space-between; padding-top:14px; border-top:1px solid var(--border); }
    .store-product-count { font-size:12px; color:var(--gray); }
    .store-product-count span { color:var(--white); font-weight:600; }
    .visit-btn { padding:8px 18px; background:var(--green); color:var(--dark); border:none; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:background 0.15s; }
    .visit-btn:hover { background:var(--green-dark); }

    .empty-state { grid-column:1/-1; text-align:center; padding:80px 20px; }
    .empty-icon { width:64px; height:64px; background:rgba(255,255,255,0.04); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
    .empty-icon svg { width:32px; height:32px; fill:var(--gray); }
    .empty-title { font-size:18px; font-weight:600; margin-bottom:8px; }
    .empty-sub { font-size:14px; color:var(--gray); }

    #loading { position:fixed; inset:0; background:var(--dark); display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:16px; }
    .spinner { width:32px; height:32px; border:2px solid rgba(255,255,255,0.1); border-top-color:var(--green); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-text { font-size:13px; color:var(--gray); }

    @media (max-width:768px) {
      .navbar { padding:0 16px; }
      .hero-banner { padding:32px 16px; }
      .page-body { padding:24px 16px; }
      .stores-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div class="loading-text">Loading stores...</div></div>

<nav class="navbar">
  <a class="nav-logo" href="../index.html">
    <div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg></div>
    <span class="nav-logo-text">HARKI<span>AGH</span></span>
  </a>
  <div class="nav-right">
    <a class="nav-btn outline" href="../index.html" id="signin-btn">Sign In</a>
    <a class="nav-btn primary" href="dashboard.html" id="dashboard-btn" style="display:none">Dashboard</a>
  </div>
</nav>

<div class="hero-banner">
  <div class="hero-tag">All Stores</div>
  <div class="hero-title">Browse & Shop</div>
  <div class="hero-sub">Discover stores from all categories. Order directly — no account needed.</div>
</div>

<div class="page-body">
  <div class="filter-row">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="search-input" placeholder="Search stores..." oninput="filterStores()" />
    </div>
  </div>
  <div class="stores-meta" id="stores-meta"></div>
  <div class="stores-grid" id="stores-grid"></div>
</div>

<script src="../js/supabase.js"></script>
<script>
  let allStores = [];

  async function init() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
      document.getElementById('signin-btn').style.display = 'none';
      document.getElementById('dashboard-btn').style.display = 'inline-block';
    }

    const { data: stores } = await _supabase
      .from('stores')
      .select('id, name, slug, description, logo_url, city, category, created_at')
      .eq('is_active', true)
      .order('created_at', { ascending: false });

    // Get product counts
    const storeIds = (stores || []).map(s => s.id);
    let productCounts = {};
    if (storeIds.length > 0) {
      const { data: products } = await _supabase
        .from('products')
        .select('store_id')
        .in('store_id', storeIds)
        .eq('is_active', true);
      (products || []).forEach(p => { productCounts[p.store_id] = (productCounts[p.store_id] || 0) + 1; });
    }

    allStores = (stores || []).map(s => ({ ...s, product_count: productCounts[s.id] || 0 }));
    renderStores(allStores);
    document.getElementById('loading').style.display = 'none';
  }

  function renderStores(stores) {
    const grid = document.getElementById('stores-grid');
    const meta = document.getElementById('stores-meta');
    meta.innerHTML = `Showing <span>${stores.length}</span> store${stores.length !== 1 ? 's' : ''}`;
    if (!stores.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2z"/></svg></div><div class="empty-title">No stores found</div><div class="empty-sub">Try a different search.</div></div>`;
      return;
    }
    grid.innerHTML = stores.map(s => `
      <a class="store-card" href="store-public.html?slug=${s.slug}">
        <div class="store-card-banner">
          <div class="store-banner-pattern"></div>
          <div class="store-logo-wrap">
            ${s.logo_url ? `<img src="${s.logo_url}" alt="${s.name}" />` : `<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2z"/></svg>`}
          </div>
        </div>
        <div class="store-card-body">
          <div class="store-name">${s.name}</div>
          <div class="store-desc">${s.description || 'No description available.'}</div>
          <div class="store-meta">
            ${s.city ? `<div class="store-meta-item"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>${s.city}</div>` : ''}
            ${s.category ? `<div class="store-meta-item"><svg viewBox="0 0 24 24"><path d="M12 2l-5.5 9h11z M17.5 13c-2.49 0-4.5 2.01-4.5 4.5S15.01 22 17.5 22 22 19.99 22 17.5 19.99 13 17.5 13zM3 21.5h8v-8H3v8z"/></svg>${s.category}</div>` : ''}
          </div>
          <div class="store-card-footer">
            <div class="store-product-count"><span>${s.product_count}</span> products</div>
            <div class="visit-btn">Visit Store</div>
          </div>
        </div>
      </a>
    `).join('');
  }

  function filterStores() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allStores.filter(s =>
      s.name.toLowerCase().includes(q) ||
      (s.description || '').toLowerCase().includes(q) ||
      (s.city || '').toLowerCase().includes(q) ||
      (s.category || '').toLowerCase().includes(q)
    );
    renderStores(filtered);
  }

  init();
</script>
</body>
</html>
