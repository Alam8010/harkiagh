<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Local Online Stores in Pakistan — Sabhai</title>
  <meta name="description" content="Discover local shops and stores from across Pakistan all in one place. Find stores by city and browse their products on Sabhai." />
  <meta name="keywords" content="Pakistani stores online, local shops Pakistan, online stores Pakistan, Karachi shops, Lahore shops" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://sabhai.store/pages/stores.html" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sabhai.store/pages/stores.html" />
  <meta property="og:title" content="Browse Local Online Stores in Pakistan — Sabhai" />
  <meta property="og:description" content="Discover local shops from across Pakistan. Find stores by city and browse their products." />
  <meta property="og:image" content="https://sabhai.store/og-image.jpg" />
  <meta property="og:site_name" content="Sabhai" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00E676;
      --green-dark: #00C853;
      --dark: #0A0A0A;
      --dark2: #111111;
      --dark3: #1A1A1A;
      --border: rgba(255,255,255,0.07);
      --gray: #888888;
      --white: #FFFFFF;
      --danger: #FF3B3B;
    }

    html, body { min-height: 100%; background: var(--dark); color: var(--white); font-family: 'Barlow', sans-serif; }

    .navbar {
      height: 64px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      position: sticky; top: 0; z-index: 100;
    }

    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-icon { width: 32px; height: 32px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .nav-logo-icon svg { width: 18px; height: 18px; fill: var(--dark); }
    .nav-logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--white); }
    .nav-logo-text span { color: var(--green); }

    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-btn { padding: 8px 16px; border-radius: 8px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-block; border: none; }
    .nav-btn.outline { background: transparent; border: 1px solid var(--border); color: var(--white); }
    .nav-btn.outline:hover { background: rgba(255,255,255,0.06); }
    .nav-btn.primary { background: var(--green); color: var(--dark); font-weight: 600; }
    .nav-btn.primary:hover { background: var(--green-dark); }
    .nav-btn.danger { background: transparent; border: 1px solid rgba(255,59,59,0.2); color: rgba(255,59,59,0.7); }
    .nav-btn.danger:hover { background: rgba(255,59,59,0.08); color: var(--danger); }

    .hero-banner {
      background: linear-gradient(135deg, rgba(0,230,118,0.06) 0%, transparent 60%);
      border-bottom: 1px solid var(--border);
      padding: 48px 32px; text-align: center;
    }

    .hero-tag { display: inline-flex; align-items: center; gap: 8px; background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.2); border-radius: 100px; padding: 5px 14px; font-size: 11px; font-weight: 600; color: var(--green); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 16px; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 5vw, 56px); letter-spacing: 2px; margin-bottom: 12px; }
    .hero-sub { font-size: 15px; color: rgba(255,255,255,0.5); max-width: 480px; margin: 0 auto; line-height: 1.6; }

    .page-body { max-width: 1200px; margin: 0 auto; padding: 36px 32px; }

    .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 10px; background: var(--dark2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; }
    .search-box svg { width: 16px; height: 16px; fill: var(--gray); flex-shrink: 0; }
    .search-box input { background: transparent; border: none; outline: none; color: var(--white); font-family: 'Barlow', sans-serif; font-size: 14px; width: 100%; }
    .search-box input::placeholder { color: var(--gray); }
    .filter-select { background: var(--dark2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--white); font-family: 'Barlow', sans-serif; font-size: 14px; outline: none; cursor: pointer; }
    .filter-select option { background: var(--dark2); }

    .stores-meta { font-size: 13px; color: var(--gray); margin-bottom: 20px; }
    .stores-meta span { color: var(--green); font-weight: 600; }

    .stores-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

    .store-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: border-color 0.15s, transform 0.15s; cursor: pointer; text-decoration: none; display: block; }
    .store-card:hover { border-color: rgba(0,230,118,0.25); transform: translateY(-3px); }

    .store-card-banner { height: 100px; background: linear-gradient(135deg, var(--dark3) 0%, rgba(0,230,118,0.05) 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .store-banner-pattern { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px); background-size: 20px 20px; }

    .store-logo-wrap { position: absolute; bottom: -50px; left: 20px; width: 110px; height: 110px; border-radius: 16px; border: 2px solid var(--dark2); overflow: hidden; background: var(--dark3); display: flex; align-items: center; justify-content: center; z-index: 1; }
    .store-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .store-logo-wrap svg { width: 28px; height: 28px; fill: rgba(255,255,255,0.15); }

    .store-card-body { padding: 68px 20px 20px; }
    .store-name { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: var(--white); }
    .store-desc { font-size: 13px; color: var(--gray); line-height: 1.5; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 38px; }
    .store-meta { display: flex; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
    .store-meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--gray); }
    .store-meta-item svg { width: 12px; height: 12px; fill: var(--green); flex-shrink: 0; }

    .store-card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1px solid var(--border); }
    .store-product-count { font-size: 12px; color: var(--gray); }
    .store-product-count span { color: var(--white); font-weight: 600; }

    .visit-btn { padding: 8px 18px; background: var(--green); color: var(--dark); border: none; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 5px; }
    .visit-btn:hover { background: var(--green-dark); }
    .visit-btn svg { width: 13px; height: 13px; fill: var(--dark); }

    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
    .empty-icon { width: 64px; height: 64px; background: rgba(255,255,255,0.04); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .empty-icon svg { width: 32px; height: 32px; fill: var(--gray); }
    .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .empty-sub { font-size: 14px; color: var(--gray); margin-bottom: 24px; }
    .empty-btn { display: inline-block; padding: 12px 24px; background: var(--green); color: var(--dark); border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--dark2); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 420px; overflow: hidden; }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .modal-close { width: 32px; height: 32px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--gray); font-size: 18px; border: none; }
    .modal-close:hover { color: var(--white); }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .field input, .field textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 16px; font-family: 'Barlow', sans-serif; font-size: 14px; color: var(--white); outline: none; transition: border-color 0.2s; }
    .field input::placeholder, .field textarea::placeholder { color: rgba(255,255,255,0.2); }
    .field input:focus, .field textarea:focus { border-color: rgba(0,230,118,0.4); background: rgba(0,230,118,0.04); }
    .field textarea { resize: vertical; min-height: 80px; }

    .submit-btn { width: 100%; padding: 13px; background: var(--green); color: var(--dark); border: none; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }
    .submit-btn:hover { background: var(--green-dark); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; margin-bottom: 14px; display: none; }
    .msg.error { background: rgba(255,59,59,0.1); border: 1px solid rgba(255,59,59,0.2); color: var(--danger); display: block; }
    .msg.success { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.2); color: var(--green); display: block; }

    #loading { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 16px; }
    .spinner { width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--gray); }

    @media (max-width: 768px) {
      .navbar { padding: 0 16px; }
      .hero-banner { padding: 32px 16px; }
      .page-body { padding: 24px 16px; }
      .stores-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading stores...</div>
</div>

<nav class="navbar">
  <a class="nav-logo" href="../index.html">
    <div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg></div>
    <span class="nav-logo-text">SABHAI</span>
  </a>
  <div class="nav-right" id="nav-right">
    <a class="nav-btn outline" href="../index.html">Home</a>
    <button class="nav-btn outline" onclick="openAuthModal('login')">Login</button>
    <button class="nav-btn primary" onclick="openAuthModal('signup')">Sign Up</button>
  </div>
  <div id="nav-user" style="display:none; align-items:center; gap:12px;">
    <span id="nav-username" style="font-size:13px;color:var(--gray)"></span>
    <a class="nav-btn outline" href="customer-profile.html">My Profile</a>
    <button class="nav-btn danger" onclick="handleLogout()">Sign Out</button>
  </div>
</nav>

<div class="hero-banner">
  <div class="hero-tag">WELCOME TO SABHAI</div>
  <h1 class="hero-title">SABHAI MEIN SABHAI</h1>
  <p class="hero-sub">explore everything from local shops to trending products in Pakistan.</p>
</div>

<div class="page-body">
  <div class="filter-row">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="search-input" placeholder="Search stores by name or location..." oninput="filterStores()" />
    </div>
    <select class="filter-select" id="location-filter" onchange="filterStores()">
      <option value="">All Locations</option>
    </select>
  </div>
  <div class="stores-meta" id="stores-meta"></div>
  <div class="stores-grid" id="stores-grid"></div>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="auth-modal-title">Login</div>
      <button class="modal-close" onclick="closeAuthModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="msg" id="auth-msg"></div>
      <div id="login-fields">
        <div class="field"><label>Email</label><input type="email" id="auth-email" placeholder="your@email.com" /></div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="auth-password" placeholder="••••••••" />
          <div style="text-align:right;margin-top:6px">
            <a href="#" onclick="forgotPassword()" style="font-size:12px;color:var(--green);text-decoration:none">Forgot Password?</a>
          </div>
        </div>
      </div>
      <div id="signup-fields" style="display:none">
        <div class="field"><label>Full Name</label><input type="text" id="auth-name" placeholder="Ahmed Khan" /></div>
        <div class="field"><label>Email</label><input type="email" id="auth-email2" placeholder="your@email.com" /></div>
        <div class="field"><label>Password</label><input type="password" id="auth-password2" placeholder="min 6 characters" /></div>
        <div class="field"><label>Phone</label><input type="text" id="auth-phone" placeholder="0300-1234567" /></div>
        <div class="field"><label>Delivery Address</label><textarea id="auth-address" placeholder="Your full delivery address..."></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="submit-btn" id="auth-submit-btn" onclick="handleAuth()">Login</button>
    </div>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const _supabase = createClient(
    'https://vlpozudvefnkkhvtjswi.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZscG96dWR2ZWZua2todnRqc3dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzgxNDAsImV4cCI6MjA5MDI1NDE0MH0.0hRczlsHkDWcsJXGFA-HHRTZcYxsgy_ARhx6EAlN8T8'
  );

  let allStores = [];
  let authMode = 'login';

  function openAuthModal(mode) {
    authMode = mode;
    const isLogin = mode === 'login';
    document.getElementById('auth-modal-title').textContent = isLogin ? 'Login' : 'Sign Up';
    document.getElementById('auth-submit-btn').textContent = isLogin ? 'Login' : 'Create Account';
    document.getElementById('login-fields').style.display = isLogin ? 'block' : 'none';
    document.getElementById('signup-fields').style.display = isLogin ? 'none' : 'block';
    document.getElementById('auth-msg').className = 'msg';
    document.getElementById('auth-modal').classList.add('open');
  }

  function closeAuthModal() {
    document.getElementById('auth-modal').classList.remove('open');
  }

  function showAuthMsg(text, type) {
    const el = document.getElementById('auth-msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  async function handleAuth() {
    const btn = document.getElementById('auth-submit-btn');
    btn.disabled = true;

    if (authMode === 'login') {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      if (!email || !password) { showAuthMsg('Please fill in all fields.', 'error'); btn.disabled = false; return; }
      const { error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) { showAuthMsg(error.message, 'error'); btn.disabled = false; return; }
      await checkAuth();
      closeAuthModal();
    } else {
      const name = document.getElementById('auth-name').value.trim();
      const email = document.getElementById('auth-email2').value.trim();
      const password = document.getElementById('auth-password2').value;
      const phone = document.getElementById('auth-phone').value.trim();
      const address = document.getElementById('auth-address').value.trim();
      if (!name || !email || !password) { showAuthMsg('Name, email and password are required.', 'error'); btn.disabled = false; return; }
      const { data, error } = await _supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
      if (error) { showAuthMsg(error.message, 'error'); btn.disabled = false; return; }
      if (data.user) {
        await _supabase.from('customers').insert({ user_id: data.user.id, full_name: name, phone: phone || null, address: address || null });
        showAuthMsg('Account created! Please check your email to confirm your account.', 'success');
        await checkAuth();
        setTimeout(() => closeAuthModal(), 1500);
      }
    }
    btn.disabled = false;
  }

  async function forgotPassword() {
    const email = document.getElementById('auth-email').value.trim();
    if (!email) { showAuthMsg('Please enter your email first.', 'error'); return; }
    const { error } = await _supabase.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://Alam08-S.github.io/harkiagh/pages/reset-password.html'
    });
    if (error) { showAuthMsg(error.message, 'error'); return; }
    showAuthMsg('Password reset email sent! Check your inbox.', 'success');
  }

  async function checkAuth() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
      const name = session.user.user_metadata?.full_name || session.user.email;
      document.getElementById('nav-right').style.display = 'none';
      document.getElementById('nav-user').style.display = 'flex';
      document.getElementById('nav-username').textContent = name;
    } else {
      document.getElementById('nav-right').style.display = 'flex';
      document.getElementById('nav-user').style.display = 'none';
    }
  }

  async function handleLogout() {
    if (!confirm('Are you sure you want to sign out?')) return;
    await _supabase.auth.signOut();
    checkAuth();
  }

  function filterStores() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const location = document.getElementById('location-filter').value;
    const filtered = allStores.filter(s => {
      const matchSearch = s.name.toLowerCase().includes(search) ||
        (s.description || '').toLowerCase().includes(search) ||
        (s.location || '').toLowerCase().includes(search);
      const matchLocation = !location || s.location === location;
      return matchSearch && matchLocation;
    });
    renderStores(filtered);
  }

  function renderStores(stores) {
    const grid = document.getElementById('stores-grid');
    const meta = document.getElementById('stores-meta');
    meta.innerHTML = `Showing <span>${stores.length}</span> store${stores.length !== 1 ? 's' : ''}`;

    if (stores.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg></div>
          <div class="empty-title">No stores found</div>
          <div class="empty-sub">Try a different search or check back later</div>
          <a class="empty-btn" href="../index.html">Go Back Home</a>
        </div>`;
      return;
    }

    grid.innerHTML = stores.map(store => {
      const productCount = store.products?.[0]?.count || 0;
      const storeUrl = `store-public.html?store=${store.slug}`;
      return `
        <a class="store-card" href="${storeUrl}">
          <div class="store-card-banner">
            <div class="store-banner-pattern"></div>
            <div class="store-logo-wrap">
              ${store.logo_url
                ? `<img src="${store.logo_url}" alt="${store.name}" />`
                : `<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2z"/></svg>`}
            </div>
          </div>
          <div class="store-card-body">
            <div class="store-name">${store.name}</div>
            <div class="store-desc">${store.description || 'Sports equipment and gear available.'}</div>
            <div class="store-meta">
              ${store.location ? `<div class="store-meta-item"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>${store.location}</div>` : ''}
              ${store.phone ? `<div class="store-meta-item"><svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>${store.phone}</div>` : ''}
            </div>
            <div class="store-card-footer">
              <div class="store-product-count"><span>${productCount}</span> products</div>
              <div class="visit-btn">Visit Store <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
            </div>
          </div>
        </a>`;
    }).join('');
  }

  async function init() {
    const { data: stores } = await _supabase
      .from('stores')
      .select('*, products(count)')
      .eq('is_active', true)
      .order('created_at', { ascending: false });

    allStores = stores || [];

    const locations = [...new Set(allStores.map(s => s.location).filter(Boolean))];
    const locationSelect = document.getElementById('location-filter');
    locations.forEach(loc => {
      const option = document.createElement('option');
      option.value = loc;
      option.textContent = loc;
      locationSelect.appendChild(option);
    });

    renderStores(allStores);
    await checkAuth();
    document.getElementById('loading').style.display = 'none';
  }

  init();
</script>
</body>
</html>
