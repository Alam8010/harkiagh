<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Harkiagh</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00E676;
      --green-dark: #00C853;
      --dark: #0A0A0A;
      --dark2: #111111;
      --border: rgba(255,255,255,0.07);
      --gray: #888888;
      --white: #FFFFFF;
      --danger: #FF3B3B;
    }

    html, body {
      min-height: 100%;
      background: var(--dark);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .card-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .logo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 20px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--green); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg { width: 20px; height: 20px; fill: var(--dark); }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 2px; color: var(--white);
    }

    .logo-text span { color: var(--green); }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-sub { font-size: 13px; color: var(--gray); }

    .card-body { padding: 28px; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.4); letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 12px 16px;
      font-family: 'Barlow', sans-serif; font-size: 14px;
      color: var(--white); outline: none;
      transition: border-color 0.2s;
    }
    .field input::placeholder { color: rgba(255,255,255,0.2); }
    .field input:focus { border-color: rgba(0,230,118,0.4); background: rgba(0,230,118,0.04); }

    .submit-btn {
      width: 100%; padding: 13px;
      background: var(--green); color: var(--dark);
      border: none; border-radius: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: background 0.15s;
      margin-top: 4px;
    }

    .submit-btn:hover { background: var(--green-dark); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg {
      padding: 12px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      margin-bottom: 16px; display: none;
    }
    .msg.error { background: rgba(255,59,59,0.1); border: 1px solid rgba(255,59,59,0.2); color: var(--danger); display: block; }
    .msg.success { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.2); color: var(--green); display: block; }

    .back-link {
      display: block; text-align: center;
      margin-top: 20px; font-size: 13px;
      color: var(--gray); text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--white); }
    .back-link span { color: var(--green); }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <a class="logo" href="../index.html">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg></div>
      <span class="logo-text">HARKIAGH</span>
    </a>
    <div class="card-title">Reset Password</div>
    <div class="card-sub">Enter your new password below</div>
  </div>

  <div class="card-body">
    <div class="msg" id="msg"></div>
    <div id="form-container">
      <div class="field">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="min 6 characters" />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="repeat your password" />
      </div>
      <button class="submit-btn" id="submit-btn" onclick="resetPassword()">
        Set New Password
      </button>
    </div>
    <a class="back-link" href="../index.html">← Back to <span>Harkiagh</span></a>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const _supabase = createClient(
    'https://vlpozudvefnkkhvtjswi.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZscG96dWR2ZWZua2todnRqc3dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzgxNDAsImV4cCI6MjA5MDI1NDE0MH0.0hRczlsHkDWcsJXGFA-HHRTZcYxsgy_ARhx6EAlN8T8'
  );

  async function resetPassword() {
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    if (!newPassword || !confirmPassword) {
      showMsg('Please fill in both fields.', 'error'); return;
    }

    if (newPassword.length < 6) {
      showMsg('Password must be at least 6 characters.', 'error'); return;
    }

    if (newPassword !== confirmPassword) {
      showMsg('Passwords do not match.', 'error'); return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Updating...';

    const { error } = await _supabase.auth.updateUser({ password: newPassword });

    if (error) {
      showMsg(error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Set New Password';
    } else {
      showMsg('Password updated successfully! Redirecting...', 'success');
      document.getElementById('form-container').style.display = 'none';
      setTimeout(() => window.location.href = '../index.html', 2000);
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }
</script>
</body>
</html>
