    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00E676;
      --green-dark: #00C853;
      --dark: #0A0A0A;
      --dark2: #111111;
      --dark3: #1A1A1A;
      --dark4: #222222;
      --border: rgba(255,255,255,0.07);
      --gray: #888888;
      --white: #FFFFFF;
      --danger: #FF3B3B;
    }

    html, body { height: 100%; background: var(--dark); color: var(--white); font-family: 'Barlow', sans-serif; overflow: hidden; }

    /* SIDEBAR */
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: var(--dark2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
    .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 32px; height: 32px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-icon svg { width: 18px; height: 18px; fill: var(--dark); }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; }
    .logo-text span { color: var(--green); }
    .nav-section { padding: 20px 12px; flex: 1; }
    .nav-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.25); letter-spacing: 2px; text-transform: uppercase; padding: 0 8px; margin-bottom: 8px; margin-top: 16px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; color: rgba(255,255,255,0.5); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; margin-bottom: 2px; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--white); }
    .nav-item.active { background: rgba(0,230,118,0.1); color: var(--green); }
    .nav-item svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
    .sidebar-bottom { padding: 16px 12px; border-top: 1px solid var(--border); }
    .user-info { display: flex; align-items: center; gap: 10px; padding: 10px 12px; margin-bottom: 8px; }
    .user-avatar { width: 32px; height: 32px; background: rgba(0,230,118,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--green); flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 11px; color: var(--gray); }
    .logout-btn { width: 100%; padding: 9px 12px; background: transparent; border: 1px solid rgba(255,59,59,0.2); border-radius: 8px; color: rgba(255,59,59,0.7); font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .logout-btn:hover { background: rgba(255,59,59,0.08); color: var(--danger); }

    /* MAIN LAYOUT */
    .main { margin-left: 220px; height: 100vh; display: flex; flex-direction: column; }

    .topbar { height: 64px; background: var(--dark2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 32px; flex-shrink: 0; }
    .page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .page-sub { font-size: 12px; color: var(--gray); }

    /* CHAT LAYOUT */
    .chat-layout { display: flex; flex: 1; overflow: hidden; }

    /* CONVERSATIONS LIST */
    .conv-list { width: 300px; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }

    .conv-search { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .conv-search-box { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; }
    .conv-search-box svg { width: 14px; height: 14px; fill: var(--gray); flex-shrink: 0; }
    .conv-search-box input { background: transparent; border: none; outline: none; color: var(--white); font-family: 'Barlow', sans-serif; font-size: 13px; width: 100%; }
    .conv-search-box input::placeholder { color: var(--gray); }

    .conv-items { flex: 1; overflow-y: auto; }
    .conv-items::-webkit-scrollbar { width: 4px; }
    .conv-items::-webkit-scrollbar-track { background: transparent; }
    .conv-items::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .conv-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid rgba(255,255,255,0.03); }

    /* Chat header */
    .chat-header { height: 64px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; padding: 0 24px; flex-shrink: 0; background: rgba(255,255,255,0.02); }

    .chat-header-status { font-size: 12px; color: var(--green); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Messages area */
    .messages-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .msg-bubble { max-width: 70%; display: flex; flex-direction: column; gap: 4px; }
    .msg-bubble.sent { align-self: flex-end; align-items: flex-end; }
    .msg-bubble.received { align-self: flex-start; align-items: flex-start; }

    .msg-text { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .msg-bubble.sent .msg-text { background: var(--green); color: var(--dark); border-radius: 12px 12px 2px 12px; }
    .msg-bubble.received .msg-text { background: var(--dark3); color: var(--white); border-radius: 12px 12px 12px 2px; border: 1px solid var(--border); }

    .msg-time { font-size: 10px; color: var(--gray); }

    .msg-date-divider { text-align: center; font-size: 11px; color: var(--gray); padding: 8px 0; }

    /* Message input */
    .chat-input-area { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }

    .chat-input-box { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; font-family: 'Barlow', sans-serif; font-size: 14px; color: var(--white); outline: none; resize: none; max-height: 120px; min-height: 44px; transition: border-color 0.2s; }
    .chat-input-box::placeholder { color: var(--gray); }
    .chat-input-box:focus { border-color: rgba(0,230,118,0.3); }

    .send-btn { width: 44px; height: 44px; background: var(--green); border: none; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
    .send-btn:hover { background: var(--green-dark); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: var(--dark); }

<script>
  const { createClient } = supabase;
  const _supabase = createClient(
    'https://vlpozudvefnkkhvtjswi.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZscG96dWR2ZWZua2todnRqc3dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzgxNDAsImV4cCI6MjA5MDI1NDE0MH0.0hRczlsHkDWcsJXGFA-HHRTZcYxsgy_ARhx6EAlN8T8'
  );

  let currentUser = null;
  let currentStore = null;
  let allChats = [];
  let selectedChatId = null;
  let realtimeChannel = null;

  async function init() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) { window.location.href = '../index.html'; return; }

    currentUser = session.user;
    const name = currentUser.user_metadata?.full_name || currentUser.email;
    const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    document.getElementById('user-name').textContent = name;
    document.getElementById('user-avatar').textContent = initials;

    const { data: store } = await _supabase.from('stores').select('*').eq('owner_id', currentUser.id).single();
    if (!store) { window.location.href = 'store-setup.html'; return; }
    currentStore = store;

    await loadChats();
    subscribeToNewMessages();
    document.getElementById('loading').style.display = 'none';
  }

  async function loadChats() {
    const { data: chats } = await _supabase
      .from('chats')
      .select(`*, customers(full_name, phone)`)
      .eq('store_id', currentStore.id)
      .order('created_at', { ascending: false });

    allChats = chats || [];

    // Load last message for each chat
    for (let chat of allChats) {
      const { data: msgs } = await _supabase
        .from('messages')
        .select('content, created_at, is_read, sender_role')
        .eq('chat_id', chat.id)
        .order('created_at', { ascending: false })
        .limit(1);

      chat.lastMessage = msgs?.[0] || null;
      chat.unreadCount = 0;

      const { count } = await _supabase
        .from('messages')
        .select('*', { count: 'exact', head: true })
        .eq('chat_id', chat.id)
        .eq('is_read', false)
        .eq('sender_role', 'customer');

      chat.unreadCount = count || 0;
    }

    renderConvList(allChats);
  }

  function renderConvList(chats) {
    const container = document.getElementById('conv-list');

    if (chats.length === 0) {
      container.innerHTML = `<div class="conv-empty">No conversations yet.<br/>Customers will appear here when they message you.</div>`;
      return;
    }

    container.innerHTML = chats.map(chat => {
      const name = chat.customers?.full_name || 'Customer';
      const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
      const lastMsg = chat.lastMessage?.content || 'No messages yet';
      const time = chat.lastMessage ? formatTime(chat.lastMessage.created_at) : '';
      const isActive = chat.id === selectedChatId;

      return `
        <div class="conv-item ${isActive ? 'active' : ''}" onclick="selectChat('${chat.id}')">
          <div class="conv-avatar">${initials}</div>
          <div class="conv-info">
            <div class="conv-name">${name}</div>
            <div class="conv-last-msg">${lastMsg}</div>
          </div>
          <div class="conv-meta">
            <span class="conv-time">${time}</span>
            ${chat.unreadCount > 0 ? `<span class="conv-badge">${chat.unreadCount}</span>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function filterConversations(query) {
    const filtered = allChats.filter(c =>
      (c.customers?.full_name || '').toLowerCase().includes(query.toLowerCase())
    );
    renderConvList(filtered);
  }

  async function selectChat(chatId) {
    selectedChatId = chatId;
    const chat = allChats.find(c => c.id === chatId);
    if (!chat) return;

    const name = chat.customers?.full_name || 'Customer';
    const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

    document.getElementById('chat-avatar').textContent = initials;
    document.getElementById('chat-name').textContent = name;
    document.getElementById('chat-placeholder').style.display = 'none';
    const activeChat = document.getElementById('active-chat');
    activeChat.style.display = 'flex';

    renderConvList(allChats);
    await loadMessages(chatId);
    await markMessagesRead(chatId);
  }

  async function loadMessages(chatId) {
    const { data: messages } = await _supabase
      .from('messages')
      .select('*')
      .eq('chat_id', chatId)
      .order('created_at', { ascending: true });

    renderMessages(messages || []);
  }

  function renderMessages(messages) {
    const area = document.getElementById('messages-area');

    if (messages.length === 0) {
      area.innerHTML = `<div style="text-align:center;color:var(--gray);font-size:13px;padding:40px 0">No messages yet. Say hello!</div>`;
      return;
    }

    let lastDate = null;
    let html = '';

    messages.forEach(msg => {
      const msgDate = new Date(msg.created_at).toLocaleDateString('en-PK');
      if (msgDate !== lastDate) {
        html += `<div class="msg-date-divider">${msgDate}</div>`;
        lastDate = msgDate;
      }

      const isSent = msg.sender_role === 'store';
      const time = formatTime(msg.created_at);

      html += `
        <div class="msg-bubble ${isSent ? 'sent' : 'received'}">
          <div class="msg-text">${escapeHtml(msg.content)}</div>
          <div class="msg-time">${time}</div>
        </div>`;
    });

    area.innerHTML = html;
    area.scrollTop = area.scrollHeight;
  }

  async function sendMessage() {
    if (!selectedChatId) return;
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content) return;

    input.value = '';
    input.style.height = 'auto';

    const { error } = await _supabase.from('messages').insert({
      chat_id: selectedChatId,
      sender_role: 'store',
      content,
      is_read: false
    });

    if (!error) {
      await loadMessages(selectedChatId);
      await loadChats();
    }
  }

  async function markMessagesRead(chatId) {
    await _supabase.from('messages')
      .update({ is_read: true })
      .eq('chat_id', chatId)
      .eq('sender_role', 'customer')
      .eq('is_read', false);

    const chat = allChats.find(c => c.id === chatId);
    if (chat) chat.unreadCount = 0;
    renderConvList(allChats);
  }

  function subscribeToNewMessages() {
    realtimeChannel = _supabase
      .channel('store-messages')
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'messages'
      }, async (payload) => {
        const msg = payload.new;
        if (msg.chat_id === selectedChatId) {
          await loadMessages(selectedChatId);
          await markMessagesRead(selectedChatId);
        }
        await loadChats();
      })
      .subscribe();
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function formatTime(dateStr) {
    const date = new Date(dateStr);
    const now = new Date();
    const diff = now - date;
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return date.toLocaleTimeString('en-PK', { hour: '2-digit', minute: '2-digit' });
    return date.toLocaleDateString('en-PK', { month: 'short', day: 'numeric' });
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  async function handleLogout() {
    if (realtimeChannel) _supabase.removeChannel(realtimeChannel);
    await _supabase.auth.signOut();
    window.location.href = '../index.html';
  }

  init();

  function toggleMobileMenu() {
  document.getElementById('mobile-menu').classList.toggle('open');
}
</script>

</body>
</html>
