<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products — Harkiagh</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --green:#00E676;--green-dark:#00C853;--dark:#0A0A0A;--dark2:#111111;--dark3:#1A1A1A;--border:rgba(255,255,255,0.07);--gray:#888888;--white:#FFFFFF;--danger:#FF3B3B;--warning:#FFB300; }
    html, body { min-height:100%; background:var(--dark); color:var(--white); font-family:'Barlow',sans-serif; }
    .mobile-bar { display:none; position:fixed; top:0; left:0; right:0; height:56px; background:var(--dark2); border-bottom:1px solid var(--border); padding:0 16px; align-items:center; justify-content:space-between; z-index:200; }
    .mobile-logo { display:flex; align-items:center; gap:8px; }
    .mobile-logo-icon { width:28px; height:28px; background:var(--green); border-radius:6px; display:flex; align-items:center; justify-content:center; }
    .mobile-logo-icon svg { width:16px; height:16px; fill:var(--dark); }
    .mobile-logo-text { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; }
    .mobile-logo-text span { color:var(--green); }
    .mobile-menu-btn { background:transparent; border:1px solid var(--border); color:var(--white); border-radius:8px; padding:6px 12px; font-size:18px; cursor:pointer; }
    .mobile-menu { display:none; position:fixed; top:56px; left:0; right:0; background:var(--dark2); border-bottom:1px solid var(--border); flex-direction:column; z-index:199; padding:8px 0; }
    .mobile-menu.open { display:flex; }
    .mobile-menu a, .mobile-menu button { padding:14px 20px; color:rgba(255,255,255,0.7); text-decoration:none; font-size:15px; font-weight:500; border:none; background:transparent; text-align:left; cursor:pointer; font-family:'Barlow',sans-serif; border-bottom:1px solid rgba(255,255,255,0.04); }
    .mobile-menu button { color:var(--danger); }
    @media (max-width:900px) { .mobile-bar{display:flex;} .sidebar{display:none;} .main{margin-left:0;margin-top:56px;} }
    .sidebar { position:fixed; left:0; top:0; bottom:0; width:220px; background:var(--dark2); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:100; }
    .sidebar-logo { padding:24px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-icon { width:32px; height:32px; background:var(--green); border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .logo-icon svg { width:18px; height:18px; fill:var(--dark); }
    .logo-text { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; }
    .logo-text span { color:var(--green); }
    .nav-section { padding:20px 12px; flex:1; }
    .nav-label { font-size:10px; font-weight:600; color:rgba(255,255,255,0.25); letter-spacing:2px; text-transform:uppercase; padding:0 8px; margin-bottom:8px; margin-top:16px; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; color:rgba(255,255,255,0.5); font-size:14px; font-weight:500; cursor:pointer; transition:all 0.15s; text-decoration:none; margin-bottom:2px; }
    .nav-item:hover { background:rgba(255,255,255,0.05); color:var(--white); }
    .nav-item.active { background:rgba(0,230,118,0.1); color:var(--green); }
    .nav-item svg { width:16px; height:16px; fill:currentColor; flex-shrink:0; }
    .sidebar-bottom { padding:16px 12px; border-top:1px solid var(--border); }
    .user-info { display:flex; align-items:center; gap:10px; padding:10px 12px; margin-bottom:8px; }
    .user-avatar { width:32px; height:32px; background:rgba(0,230,118,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:var(--green); flex-shrink:0; }
    .user-name { font-size:13px; font-weight:500; color:var(--white); }
    .user-role { font-size:11px; color:var(--gray); }
    .logout-btn { width:100%; padding:9px 12px; background:transparent; border:1px solid rgba(255,59,59,0.2); border-radius:8px; color:rgba(255,59,59,0.7); font-family:'Barlow',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:6px; }
    .logout-btn:hover { background:rgba(255,59,59,0.08); color:var(--danger); }
    .main { margin-left:220px; min-height:100vh; }
    .topbar { height:64px; background:var(--dark2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 32px; position:sticky; top:0; z-index:50; }
    .page-title { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .page-sub { font-size:12px; color:var(--gray); }
    .add-btn { padding:10px 20px; background:var(--green); color:var(--dark); border:none; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:background 0.15s; display:flex; align-items:center; gap:6px; }
    .add-btn:hover { background:var(--green-dark); }
    .add-btn svg { width:16px; height:16px; fill:var(--dark); }
    .page-body { padding:28px 32px; }
    @media (max-width:900px) { .page-body{padding:16px;} .topbar{padding:0 16px;} }

    .filter-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .search-box { flex:1; min-width:200px; display:flex; align-items:center; gap:10px; background:var(--dark2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; }
    .search-box svg { width:16px; height:16px; fill:var(--gray); flex-shrink:0; }
    .search-box input { background:transparent; border:none; outline:none; color:var(--white); font-family:'Barlow',sans-serif; font-size:14px; width:100%; }
    .search-box input::placeholder { color:var(--gray); }

    .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
    .product-card { background:var(--dark2); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:border-color 0.15s; }
    .product-card:hover { border-color:rgba(255,255,255,0.12); }
    .product-img { height:160px; background:var(--dark3); position:relative; }
    .product-img img { width:100%; height:100%; object-fit:cover; }
    .product-img-placeholder { height:160px; display:flex; align-items:center; justify-content:center; background:var(--dark3); }
    .product-img-placeholder svg { width:36px; height:36px; fill:rgba(255,255,255,0.06); }
    .product-info { padding:14px; }
    .product-cat { font-size:10px; font-weight:600; color:var(--green); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; }
    .product-name { font-size:15px; font-weight:600; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .product-price { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--green); margin-bottom:10px; }
    .product-stock { font-size:12px; color:var(--gray); margin-bottom:10px; }
    .product-stock.low { color:var(--warning); }
    .product-actions { display:flex; gap:8px; }
    .edit-btn { flex:1; padding:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; color:var(--white); font-size:12px; font-weight:500; cursor:pointer; transition:all 0.15s; text-align:center; }
    .edit-btn:hover { background:rgba(255,255,255,0.1); }
    .delete-btn { width:34px; height:34px; background:rgba(255,59,59,0.08); border:1px solid rgba(255,59,59,0.2); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--danger); transition:all 0.15s; flex-shrink:0; }
    .delete-btn:hover { background:rgba(255,59,59,0.15); }
    .delete-btn svg { width:14px; height:14px; fill:currentColor; }

    .empty-state { text-align:center; padding:80px 20px; }
    .empty-icon { width:64px; height:64px; background:rgba(255,255,255,0.04); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
    .empty-icon svg { width:32px; height:32px; fill:var(--gray); }
    .empty-title { font-size:18px; font-weight:600; margin-bottom:8px; }
    .empty-sub { font-size:14px; color:var(--gray); margin-bottom:24px; }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:300; display:none; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--dark2); border:1px solid var(--border); border-radius:16px; width:100%; max-width:480px; overflow:hidden; max-height:90vh; overflow-y:auto; }
    .modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--dark2); z-index:1; }
    .modal-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .modal-close { width:32px; height:32px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--gray); font-size:18px; }
    .modal-close:hover { color:var(--white); }
    .modal-body { padding:24px; }
    .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:11px; font-weight:600; color:rgba(255,255,255,0.4); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
    .field input, .field textarea, .field select { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:12px 16px; font-family:'Barlow',sans-serif; font-size:14px; color:var(--white); outline:none; transition:border-color 0.2s; }
    .field textarea { resize:vertical; min-height:70px; }
    .field select { cursor:pointer; }
    .field select option { background:var(--dark2); }
    .field input::placeholder, .field textarea::placeholder { color:rgba(255,255,255,0.2); }
    .field input:focus, .field textarea:focus, .field select:focus { border-color:rgba(0,230,118,0.4); background:rgba(0,230,118,0.04); }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .submit-btn { flex:1; padding:12px; background:var(--green); color:var(--dark); border:none; border-radius:10px; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:background 0.15s; }
    .submit-btn:hover { background:var(--green-dark); }
    .submit-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .cancel-btn { padding:12px 20px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:10px; color:var(--white); font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.15s; }
    .cancel-btn:hover { background:rgba(255,255,255,0.1); }
    .msg { padding:10px 14px; border-radius:8px; font-size:13px; font-weight:500; margin-bottom:14px; display:none; }
    .msg.error { background:rgba(255,59,59,0.1); border:1px solid rgba(255,59,59,0.2); color:var(--danger); display:block; }
    .msg.success { background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.2); color:var(--green); display:block; }

    .img-upload-area { border:2px dashed rgba(255,255,255,0.1); border-radius:10px; padding:20px; text-align:center; cursor:pointer; transition:border-color 0.15s; }
    .img-upload-area:hover { border-color:rgba(0,230,118,0.3); }
    .img-preview { width:100%; max-height:160px; object-fit:cover; border-radius:8px; margin-bottom:8px; display:none; }
    .img-upload-text { font-size:13px; color:var(--gray); }
    #img-file-input { display:none; }
    .img-upload-progress { font-size:12px; color:var(--green); margin-top:8px; display:none; }

    #loading { position:fixed; inset:0; background:var(--dark); display:flex; align-items:center; justify-content:center; z-index:999; }
    .spinner { width:32px; height:32px; border:2px solid rgba(255,255,255,0.1); border-top-color:var(--green); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    @media (max-width:900px) { .products-grid{grid-template-columns:repeat(2,1fr);} }
    @media (max-width:480px) { .products-grid{grid-template-columns:1fr;} .field-row{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>

<div class="mobile-bar">
  <div class="mobile-logo">
    <div class="mobile-logo-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg></div>
    <span class="mobile-logo-text">HARKI<span>AGH</span></span>
  </div>
  <button class="mobile-menu-btn" onclick="document.getElementById('mobile-menu').classList.toggle('open')">☰</button>
</div>
<div class="mobile-menu" id="mobile-menu">
  <a href="dashboard.html">Dashboard</a>
  <a href="products.html">Products</a>
  <a href="orders.html">Orders</a>
  <a href="store-setup.html">Store Settings</a>
  <button onclick="logout()">Logout</button>
</div>

<div class="sidebar">
  <a class="sidebar-logo" href="../index.html">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg></div>
    <span class="logo-text">HARKI<span>AGH</span></span>
  </a>
  <div class="nav-section">
    <div class="nav-label">Store</div>
    <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>Dashboard</a>
    <a class="nav-item active" href="products.html"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>Products</a>
    <a class="nav-item" href="orders.html"><svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>Orders</a>
    <div class="nav-label">Settings</div>
    <a class="nav-item" href="store-setup.html"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>Store Settings</a>
  </div>
  <div class="sidebar-bottom">
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">?</div>
      <div><div class="user-name" id="user-name">Loading...</div><div class="user-role">Store Owner</div></div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title">Products</div>
      <div class="page-sub" id="products-count">0 products</div>
    </div>
    <button class="add-btn" onclick="openAddModal()">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Add Product
    </button>
  </div>

  <div class="page-body">
    <div class="filter-bar">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="search-input" placeholder="Search products..." oninput="renderProducts()" />
      </div>
    </div>
    <div class="products-grid" id="products-grid"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Product</div>
      <div class="modal-close" onclick="closeModal()">×</div>
    </div>
    <div class="modal-body">
      <div class="msg" id="modal-msg"></div>
      <input type="file" id="img-file-input" accept="image/*" onchange="uploadImage(this)" />
      <div class="field">
        <label>Product Image</label>
        <div class="img-upload-area" onclick="document.getElementById('img-file-input').click()">
          <img id="img-preview" class="img-preview" />
          <div id="img-upload-placeholder">
            <div class="img-upload-text">Click to upload product image</div>
          </div>
          <div class="img-upload-progress" id="img-upload-progress">Uploading...</div>
        </div>
      </div>
      <div class="field"><label>Product Name *</label><input type="text" id="prod-name" placeholder="e.g. Blue Cotton T-Shirt" /></div>
      <div class="field"><label>Description</label><textarea id="prod-desc" placeholder="Describe your product..."></textarea></div>
      <div class="field-row">
        <div class="field"><label>Price (PKR) *</label><input type="number" id="prod-price" placeholder="0" min="0" /></div>
        <div class="field"><label>Stock Quantity</label><input type="number" id="prod-stock" placeholder="e.g. 10" min="0" /></div>
      </div>
      <div class="field"><label>Category</label><input type="text" id="prod-category" placeholder="e.g. Shirts, Shoes, Electronics" /></div>
    </div>
    <div class="modal-footer">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="submit-btn" id="save-product-btn" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script src="../js/supabase.js"></script>
<script>
  let storeId = null;
  let allProducts = [];
  let editingProductId = null;
  let currentImageUrl = null;

  async function init() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) { window.location.href = '../index.html'; return; }
    const user = session.user;
    const name = user.user_metadata?.full_name || user.email;
    document.getElementById('user-name').textContent = name;
    document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();

    const { data: store } = await _supabase.from('stores').select('id').eq('owner_id', user.id).single();
    if (!store) { window.location.href = 'store-setup.html'; return; }
    storeId = store.id;
    await loadProducts();
    document.getElementById('loading').style.display = 'none';
  }

  async function loadProducts() {
    const { data } = await _supabase.from('products').select('*').eq('store_id', storeId).order('created_at', { ascending: false });
    allProducts = data || [];
    renderProducts();
  }

  function renderProducts() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allProducts.filter(p => !q || p.name.toLowerCase().includes(q) || (p.category||'').toLowerCase().includes(q));
    document.getElementById('products-count').textContent = `${allProducts.length} product${allProducts.length !== 1 ? 's' : ''}`;
    const grid = document.getElementById('products-grid');
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div><div class="empty-title">${allProducts.length ? 'No results' : 'No products yet'}</div><div class="empty-sub">${allProducts.length ? 'Try a different search.' : 'Add your first product to get started.'}</div></div>`;
      return;
    }
    grid.innerHTML = filtered.map(p => `
      <div class="product-card">
        ${p.image_url ? `<div class="product-img"><img src="${p.image_url}" alt="${p.name}" /></div>` : `<div class="product-img-placeholder"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></div>`}
        <div class="product-info">
          ${p.category ? `<div class="product-cat">${p.category}</div>` : ''}
          <div class="product-name">${p.name}</div>
          <div class="product-price">PKR ${Number(p.price).toLocaleString()}</div>
          <div class="product-stock ${p.stock !== null && p.stock <= 5 ? 'low' : ''}">Stock: ${p.stock !== null ? p.stock : '∞'}</div>
          <div class="product-actions">
            <div class="edit-btn" onclick="openEditModal('${p.id}')">Edit</div>
            <div class="delete-btn" onclick="deleteProduct('${p.id}')"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></div>
          </div>
        </div>
      </div>
    `).join('');
  }

  function openAddModal() {
    editingProductId = null;
    currentImageUrl = null;
    document.getElementById('modal-title').textContent = 'Add Product';
    document.getElementById('prod-name').value = '';
    document.getElementById('prod-desc').value = '';
    document.getElementById('prod-price').value = '';
    document.getElementById('prod-stock').value = '';
    document.getElementById('prod-category').value = '';
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('img-upload-placeholder').style.display = 'block';
    document.getElementById('modal-msg').className = 'msg';
    document.getElementById('product-modal').classList.add('open');
  }

  function openEditModal(productId) {
    const p = allProducts.find(x => x.id === productId);
    if (!p) return;
    editingProductId = productId;
    currentImageUrl = p.image_url;
    document.getElementById('modal-title').textContent = 'Edit Product';
    document.getElementById('prod-name').value = p.name;
    document.getElementById('prod-desc').value = p.description || '';
    document.getElementById('prod-price').value = p.price;
    document.getElementById('prod-stock').value = p.stock !== null ? p.stock : '';
    document.getElementById('prod-category').value = p.category || '';
    if (p.image_url) {
      const img = document.getElementById('img-preview');
      img.src = p.image_url;
      img.style.display = 'block';
      document.getElementById('img-upload-placeholder').style.display = 'none';
    } else {
      document.getElementById('img-preview').style.display = 'none';
      document.getElementById('img-upload-placeholder').style.display = 'block';
    }
    document.getElementById('modal-msg').className = 'msg';
    document.getElementById('product-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('product-modal').classList.remove('open');
  }

  async function uploadImage(input) {
    const file = input.files[0];
    if (!file) return;
    document.getElementById('img-upload-progress').style.display = 'block';
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_PRESET);
    formData.append('folder', 'harkiagh/products');
    try {
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method:'POST', body:formData });
      const data = await res.json();
      currentImageUrl = data.secure_url;
      const img = document.getElementById('img-preview');
      img.src = currentImageUrl;
      img.style.display = 'block';
      document.getElementById('img-upload-placeholder').style.display = 'none';
    } catch(e) {
      showModalMsg('Image upload failed. Please try again.', 'error');
    }
    document.getElementById('img-upload-progress').style.display = 'none';
  }

  async function saveProduct() {
    const name = document.getElementById('prod-name').value.trim();
    const price = parseFloat(document.getElementById('prod-price').value);
    const desc = document.getElementById('prod-desc').value.trim();
    const stock = document.getElementById('prod-stock').value;
    const category = document.getElementById('prod-category').value.trim();

    if (!name) { showModalMsg('Product name is required.', 'error'); return; }
    if (!price || price <= 0) { showModalMsg('Please enter a valid price.', 'error'); return; }

    const btn = document.getElementById('save-product-btn');
    btn.disabled = true; btn.textContent = 'Saving...';

    const payload = {
      store_id: storeId, name, description: desc, price,
      stock: stock !== '' ? parseInt(stock) : null,
      category: category || null, image_url: currentImageUrl, is_active: true
    };

    let error;
    if (editingProductId) {
      ({ error } = await _supabase.from('products').update(payload).eq('id', editingProductId));
    } else {
      ({ error } = await _supabase.from('products').insert(payload));
    }

    if (error) {
      showModalMsg('Error saving product: ' + error.message, 'error');
    } else {
      closeModal();
      await loadProducts();
    }
    btn.disabled = false; btn.textContent = 'Save Product';
  }

  async function deleteProduct(productId) {
    if (!confirm('Delete this product?')) return;
    await _supabase.from('products').update({ is_active: false }).eq('id', productId);
    await loadProducts();
  }

  function showModalMsg(text, type) {
    const el = document.getElementById('modal-msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  async function logout() {
    await _supabase.auth.signOut();
    window.location.href = '../index.html';
  }

  init();
</script>
</body>
</html>
