<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store — Harkiagh</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00E676;
      --green-dark: #00C853;
      --dark: #0A0A0A;
      --dark2: #111111;
      --dark3: #1A1A1A;
      --border: rgba(255,255,255,0.07);
      --gray: #888888;
      --white: #FFFFFF;
      --danger: #FF3B3B;
      --warning: #FFB300;
    }

    html, body { min-height: 100%; background: var(--dark); color: var(--white); font-family: 'Barlow', sans-serif; }

    /* NAVBAR */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      height: 64px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
    }

    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-icon { width: 32px; height: 32px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .nav-logo-icon svg { width: 18px; height: 18px; fill: var(--dark); }
    .nav-store-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--white); }

    .nav-right { display: flex; align-items: center; gap: 12px; }

    .nav-btn {
      padding: 8px 16px; border-radius: 8px;
      font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; text-decoration: none;
      display: flex; align-items: center; gap: 6px;
    }

    .nav-btn.outline { background: transparent; border: 1px solid var(--border); color: var(--white); }
    .nav-btn.outline:hover { background: rgba(255,255,255,0.06); }
    .nav-btn.primary { background: var(--green); border: none; color: var(--dark); font-weight: 600; }
    .nav-btn.primary:hover { background: var(--green-dark); }
    .nav-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* HERO */
    .store-hero {
      background: linear-gradient(135deg, rgba(0,230,118,0.06) 0%, transparent 60%);
      border-bottom: 1px solid var(--border);
      padding: 48px 32px;
      display: flex; align-items: center; gap: 24px;
    }

    .hero-logo {
      width: 80px; height: 80px; border-radius: 16px;
      object-fit: cover;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hero-logo svg { width: 36px; height: 36px; fill: rgba(255,255,255,0.2); }
    .hero-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }

    .hero-info { flex: 1; }
    .hero-name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; margin-bottom: 6px; }
    .hero-desc { font-size: 14px; color: rgba(255,255,255,0.5); max-width: 500px; line-height: 1.6; margin-bottom: 12px; }
    .hero-meta { display: flex; gap: 20px; flex-wrap: wrap; }
    .hero-meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--gray); }
    .hero-meta-item svg { width: 14px; height: 14px; fill: var(--green); }

    /* MAIN CONTENT */
    .store-body { max-width: 1200px; margin: 0 auto; padding: 32px; }

    /* FILTER ROW */
    .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }

    .search-box { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 10px; background: var(--dark2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
    .search-box svg { width: 16px; height: 16px; fill: var(--gray); flex-shrink: 0; }
    .search-box input { background: transparent; border: none; outline: none; color: var(--white); font-family: 'Barlow', sans-serif; font-size: 14px; width: 100%; }
    .search-box input::placeholder { color: var(--gray); }

    .cat-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .cat-pill { padding: 8px 16px; background: var(--dark2); border: 1px solid var(--border); border-radius: 100px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: rgba(255,255,255,0.6); }
    .cat-pill:hover { color: var(--white); border-color: rgba(255,255,255,0.15); }
    .cat-pill.active { background: rgba(0,230,118,0.1); border-color: rgba(0,230,118,0.3); color: var(--green); }

    /* PRODUCTS GRID */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px; }

    .product-card {
      background: var(--dark2); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
    }
    .product-card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-3px); }

    .product-img { height: 200px; overflow: hidden; position: relative; background: var(--dark3); }
    .product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .product-card:hover .product-img img { transform: scale(1.05); }

    .product-img-placeholder { height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; background: var(--dark3); }
    .product-img-placeholder svg { width: 40px; height: 40px; fill: rgba(255,255,255,0.08); }
    .product-img-placeholder span { font-size: 12px; color: rgba(255,255,255,0.2); }

    .out-of-stock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; }
    .out-of-stock-label { background: rgba(255,59,59,0.9); color: var(--white); font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 100px; letter-spacing: 1px; text-transform: uppercase; }

    .product-info { padding: 16px; }
    .product-cat { font-size: 10px; font-weight: 600; color: var(--green); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .product-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .product-desc { font-size: 12px; color: var(--gray); line-height: 1.5; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-footer { display: flex; align-items: center; justify-content: space-between; }
    .product-price { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--green); letter-spacing: 1px; }
    .product-stock-label { font-size: 11px; color: var(--gray); }

    .whatsapp-btn {
      padding: 8px 14px; background: #25D366; color: var(--white);
      border: none; border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
      cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; gap: 5px; text-decoration: none;
    }
    .whatsapp-btn:hover { background: #1ebd59; }
    .whatsapp-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* EMPTY STATE */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
    .empty-icon { width: 64px; height: 64px; background: rgba(255,255,255,0.04); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .empty-icon svg { width: 32px; height: 32px; fill: var(--gray); }
    .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .empty-sub { font-size: 14px; color: var(--gray); }

    /* MODALS */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--dark2); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .modal-close { width: 32px; height: 32px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.4); transition: color 0.15s; }
    .modal-close:hover { color: var(--white); }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .field input, .field textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 16px; font-family: 'Barlow', sans-serif; font-size: 14px; color: var(--white); }
    .field input::placeholder, .field textarea::placeholder { color: rgba(255,255,255,0.2); }
    .field input:focus, .field textarea:focus { border-color: rgba(0,230,118,0.4); background: rgba(0,230,118,0.04); }
    .field textarea { resize: vertical; min-height: 80px; }

    .submit-btn { width: 100%; padding: 13px; background: var(--green); color: var(--dark); border: none; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .submit-btn:hover { background: var(--green-dark); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; margin-bottom: 14px; display: none; }
    .msg.error { background: rgba(255,59,59,0.1); border: 1px solid rgba(255,59,59,0.2); color: var(--danger); display: block; }
    .msg.success { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.2); color: var(--green); display: block; }

    /* PRODUCT DETAIL MODAL */
    .product-modal-img { width: 100%; height: 280px; object-fit: cover; border-radius: 10px; margin-bottom: 20px; background: var(--dark3); }
    .product-modal-img-placeholder { width: 100%; height: 280px; background: var(--dark3); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .product-modal-img-placeholder svg { width: 48px; height: 48px; fill: rgba(255,255,255,0.1); }

    /* LOADING */
    #loading { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 16px; }
    .spinner { width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--gray); }

    /* CHAT BUBBLE */
    .chat-bubble-btn {
      position: fixed; bottom: 28px; right: 28px;
      width: 52px; height: 52px;
      background: var(--green); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 4px 20px rgba(0,230,118,0.3);
      transition: transform 0.15s;
      z-index: 150;
    }
    .chat-bubble-btn:hover { transform: scale(1.08); }
    .chat-bubble-btn svg { width: 24px; height: 24px; fill: var(--dark); }

    @media (max-width: 768px) {
      .navbar { padding: 0 16px; }
      .store-hero { padding: 24px 16px; flex-direction: column; align-items: flex-start; }
      .store-body { padding: 20px 16px; }
      .hero-name { font-size: 28px; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading store...</div>
</div>

<!-- Navbar -->
<nav class="navbar">
  <a class="nav-logo" href="#">
    <div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg></div>
    <span class="nav-store-name" id="nav-store-name">Loading...</span>
  </a>
  <div class="nav-right">
    <div id="nav-auth">
      <button class="nav-btn outline" onclick="openAuthModal('login')">Login</button>
      <button class="nav-btn primary" onclick="openAuthModal('signup')">Sign Up</button>
    </div>
    <div id="nav-user" style="display:none">
      <a class="nav-btn outline" href="customer-profile.html">My Profile</a>
      <button class="nav-btn outline" onclick="handleLogout()">Sign Out</button>

</nav>

<!-- Store Hero -->
<div class="store-hero">

  </div>
  <div class="hero-info">

    <div class="hero-desc" id="hero-desc"></div>
    <div class="hero-meta">

        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5"/></svg>

        <span id="hero-phone-text"></span>
      </div>
    </div>
  </div>
</div>

<!-- Store Body -->
<div class="store-body">
  <!-- Filter Row -->

      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

    <div class="cat-pills" id="cat-pills">
      <div class="cat-pill active" onclick="setCat('')">All</div>

  <!-- Products Grid -->
  <div class="products-grid" id="products-grid"></div>
</div>

<!-- Chat Bubble -->
<div class="chat-bubble-btn" onclick="openChatModal()" title="Chat with store">

        <div class="field"><label>Full Name</label><input type="text" id="auth-name" placeholder="Ahmed Khan" /></div>

<!-- PRODUCT DETAIL MODAL -->

</div>

<!-- CHAT MODAL -->

    </div>
  </div>
</div>

    const { error } = await _supabase.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://Alam08-S.github.io/Harkiagh/pages/reset-password.html'
    });
    if (error) { showAuthMsg(error.message, 'error'); return; }
    showAuthMsg('Password reset email sent! Check your inbox.', 'success');
  }

  let currentStore = null;
  let allProducts = [];
  let currentUser = null;
  let currentCustomer = null;
  let selectedCategory = '';
  let selectedProduct = null;
  let currentChatId = null;
  let authMode = 'login';
  let chatChannel = null;

  // ── INIT ──
  async function init() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('store');

    let storeQuery = _supabase.from('stores').select('*').eq('is_active', true);
    if (slug) storeQuery = storeQuery.eq('slug', slug);
    else storeQuery = storeQuery.limit(1);

    const { data: stores } = await storeQuery;
    if (!stores || stores.length === 0) {
      document.getElementById('loading').style.display = 'none';
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#888;font-size:16px">Store not found.</div>';
      return;
    }

    currentStore = stores[0];
    renderStoreInfo();
    await loadProducts();
    await checkAuth();
    document.getElementById('loading').style.display = 'none';
  }

  function renderStoreInfo() {
    document.title = currentStore.name + ' — Harkiagh';
    document.getElementById('nav-store-name').textContent = currentStore.name;
    document.getElementById('hero-name').textContent = currentStore.name;
    document.getElementById('hero-desc').textContent = currentStore.description || '';

    if (currentStore.logo_url) {
      document.getElementById('hero-logo').innerHTML = `<img src="${currentStore.logo_url}" alt="logo" />`;
    }
    if (currentStore.location) {
      document.getElementById('hero-location').style.display = 'flex';
      document.getElementById('hero-location-text').textContent = currentStore.location;
    }
    if (currentStore.phone) {
      document.getElementById('hero-phone').style.display = 'flex';
      document.getElementById('hero-phone-text').textContent = currentStore.phone;
    }
  }

  async function loadProducts() {
    const { data: products } = await _supabase
      .from('products')
      .select('*')
      .eq('store_id', currentStore.id)
      .eq('status', 'approved')
      .order('created_at', { ascending: false });

    allProducts = products || [];
    buildCategoryPills();
    renderProducts(allProducts);
  }

  function buildCategoryPills() {
    const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
    const container = document.getElementById('cat-pills');
    container.innerHTML = `<div class="cat-pill active" onclick="setCat('')">All</div>` +
      cats.map(c => `<div class="cat-pill" onclick="setCat('${c}')">${c}</div>`).join('');
  }

  function setCat(cat) {
    selectedCategory = cat;
    document.querySelectorAll('.cat-pill').forEach(p => {
      p.classList.toggle('active', p.textContent === (cat || 'All'));
    });
    filterProducts();
  }

  function filterProducts() {
    const search = document.getElementById('search-input').value.toLowerCase();
    let filtered = allProducts.filter(p => {
      const matchCat = !selectedCategory || p.category === selectedCategory;
      const matchSearch = p.name.toLowerCase().includes(search) || (p.description || '').toLowerCase().includes(search);
      return matchCat && matchSearch;
    });
    renderProducts(filtered);
  }

  function generateWhatsAppLink(product) {
    if (!currentStore.phone) return '#';
    const phone = currentStore.phone.replace(/[^\d]/g, '');
    const message = `Hi, I'm interested in *${product.name}* - PKR ${Number(product.price).toLocaleString('en-PK')}. Can you tell me more?`;
    const encoded = encodeURIComponent(message);
    return `https://wa.me/${phone}?text=${encoded}`;
  }

  function renderProducts(products) {
    const grid = document.getElementById('products-grid');
    if (products.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg></div>
          <div class="empty-title">No products yet</div>
          <div class="empty-sub">Check back soon!</div>
        </div>`;
      return;
    }

    grid.innerHTML = products.map(p => {
      const img = p.image_urls?.[0];
      return `
        <div class="product-card" onclick="openProductModal('${p.id}')">
          <div class="product-img" style="position:relative">
            ${img ? `<img src="${img}" alt="${p.name}" />` : `<div class="product-img-placeholder"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2z"/></svg></div>`}
            ${p.stock_qty === 0 ? `<div class="out-of-stock-overlay"><span class="out-of-stock-label">Out of Stock</span></div>` : ''}
          </div>
          <div class="product-info">
            <div class="product-cat">${p.category || 'General'}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-desc">${p.description || ''}</div>
            <div class="product-footer">
              <div>
                <div class="product-price">PKR ${Number(p.price).toLocaleString('en-PK')}</div>
                <div class="product-stock-label">${p.stock_qty > 0 ? p.stock_qty + ' in stock' : 'Out of stock'}</div>
              </div>
              ${p.stock_qty > 0 ? `
                <a class="whatsapp-btn" href="${generateWhatsAppLink(p)}" target="_blank" onclick="event.stopPropagation()">
                  <svg viewBox="0 0 24 24" style="width:12px;height:12px"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.67-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.076 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421-7.403h-.004c-1.025 0-2.031.213-3.001.62l-.215.102-2.223-.585.596 2.179-.13.21a5.122 5.122 0 00-.756 2.933c0 2.839 2.311 5.15 5.15 5.15 1.378 0 2.674-.535 3.646-1.509 1.973-1.973 1.973-5.118 0-7.09-1.973-1.973-5.118-1.973-7.09 0m7.09-2.151c1.587.587 3.02 1.42 4.21 2.609 1.193 1.191 2.024 2.623 2.612 4.21.439 1.183.666 2.426.666 3.718 0 5.338-4.34 9.678-9.678 9.678-1.292 0-2.534-.227-3.717-.666-1.588-.589-3.02-1.419-4.209-2.609l.002.001C2.309 20.122.5 17.314.5 14.032.5 8.694 4.84 4.354 10.177 4.354c1.293 0 2.535.227 3.718.667"/></svg>
                  Chat
                </a>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ── PRODUCT MODAL ──
  function openProductModal(productId) {
    selectedProduct = allProducts.find(p => p.id === productId);
    if (!selectedProduct) return;

    document.getElementById('pm-name').textContent = selectedProduct.name;
    document.getElementById('pm-cat').textContent = selectedProduct.category || '';
    document.getElementById('pm-desc').textContent = selectedProduct.description || 'No description available.';
    document.getElementById('pm-price').textContent = 'PKR ' + Number(selectedProduct.price).toLocaleString('en-PK');
    document.getElementById('pm-stock').textContent = selectedProduct.stock_qty + ' in stock';

    const imgContainer = document.getElementById('pm-img-container');
    const images = selectedProduct.image_urls || [];
    if (images.length === 0) {
      imgContainer.innerHTML = `<div class="product-modal-img-placeholder"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2z"/></svg></div>`;
    } else {
      imgContainer.innerHTML = `
        <div style="position:relative;margin-bottom:12px">
          <img id="pm-main-img" class="product-modal-img" src="${images[0]}" style="margin-bottom:0" />
        </div>
        ${images.length > 1 ? `
        <div style="display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px">
          ${images.map((url, i) => `
            <img
              src="${url}"
              onclick="document.getElementById('pm-main-img').src='${url}';document.querySelectorAll('.thumb-img').forEach(t=>t.style.borderColor='transparent');this.style.borderColor='var(--green)'"
              class="thumb-img"
              style="width:64px;height:64px;object-fit:cover;border-radius:8px;cursor:pointer;flex-shrink:0;border:2px solid ${i===0?'var(--green)':'transparent'};transition:border-color 0.15s"
            />
          `).join('')}
        </div>` : ''}
      `;
    }

    const whatsappBtn = document.getElementById('pm-whatsapp-btn');
    whatsappBtn.href = generateWhatsAppLink(selectedProduct);

    document.getElementById('product-modal').classList.add('open');
  }

  // ── AUTH ──
  async function checkAuth() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
      currentUser = session.user;
      const { data: customer } = await _supabase.from('customers').select('*').eq('user_id', currentUser.id).single();
      currentCustomer = customer;
      document.getElementById('nav-auth').style.display = 'none';
      document.getElementById('nav-user').style.display = 'flex';
    }
  }

  function openAuthModal(mode) {
    authMode = mode;
    document.getElementById('auth-modal-title').textContent = mode === 'login' ? 'Login' : 'Sign Up';
    document.getElementById('auth-submit-btn').textContent = mode === 'login' ? 'Login' : 'Create Account';
    document.getElementById('login-fields').style.display = mode === 'login' ? 'block' : 'none';
    document.getElementById('signup-fields').style.display = mode === 'signup' ? 'block' : 'none';
    document.getElementById('auth-msg').className = 'msg';
    document.getElementById('auth-modal').classList.add('open');
  }

  async function handleAuth() {
    const btn = document.getElementById('auth-submit-btn');
    btn.disabled = true;

    if (authMode === 'login') {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { showAuthMsg('Please fill in all fields.', 'error'); btn.disabled = false; return; }

      const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) { showAuthMsg(error.message, 'error'); btn.disabled = false; return; }
      await checkAuth();
      closeModal('auth-modal');
    } else {
      const name = document.getElementById('auth-name').value.trim();
      const email = document.getElementById('auth-email2').value.trim();
      const password = document.getElementById('auth-password').value;
      const phone = document.getElementById('auth-phone').value.trim();
      const address = document.getElementById('auth-address').value.trim();

      if (!name || !email || !password) { showAuthMsg('Name, email and password are required.', 'error'); btn.disabled = false; return; }

      const { data, error } = await _supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
      if (error) { showAuthMsg(error.message, 'error'); btn.disabled = false; return; }

      if (data.user) {
        const { error: customerError } = await _supabase.from('customers').insert({
          user_id: data.user.id,
          full_name: name,
          phone: phone || null,
          address: address || null
        });
        if (customerError) {
          showAuthMsg('Account created but profile failed: ' + customerError.message, 'error');
        } else {
          showAuthMsg('Account created! You can now use WhatsApp to contact stores.', 'success');
          await checkAuth();
          setTimeout(() => closeModal('auth-modal'), 1500);
        }
      }
    }
    btn.disabled = false;
  }

  function showAuthMsg(text, type) {
    const el = document.getElementById('auth-msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  async function handleLogout() {
    await _supabase.auth.signOut();
    currentUser = null;
    currentCustomer = null;
    filterProducts();
    document.getElementById('nav-auth').style.display = 'flex';
    document.getElementById('nav-user').style.display = 'none';
  }

  // ── CHAT ──
  async function openChatModal() {
    if (!currentUser) { openAuthModal('login'); return; }

    document.getElementById('chat-modal').classList.add('open');

    const { data: existingChat } = await _supabase
      .from('chats')
      .select('*')
      .eq('store_id', currentStore.id)
      .eq('customer_id', currentCustomer.id)
      .single();

    if (existingChat) {
      currentChatId = existingChat.id;
    } else {
      const { data: newChat } = await _supabase.from('chats').insert({
        store_id: currentStore.id,
        customer_id: currentCustomer.id
      }).select().single();
      currentChatId = newChat?.id;
    }

    await loadChatMessages();
    subscribeToChatMessages();
  }

  async function loadChatMessages() {
    if (!currentChatId) return;
    const { data: messages } = await _supabase
      .from('messages').select('*')
      .eq('chat_id', currentChatId)
      .order('created_at', { ascending: true });

    const container = document.getElementById('chat-messages');
    if (!messages || messages.length === 0) {
      container.innerHTML = `<div style="text-align:center;color:var(--gray);font-size:13px;padding:20px">Send a message to start the conversation!</div>`;
      return;
    }

    container.innerHTML = messages.map(msg => {
      const isMine = msg.sender_role === 'customer';
      return `<div style="display:flex;justify-content:${isMine ? 'flex-end' : 'flex-start'}">
        <div style="max-width:75%;padding:9px 13px;border-radius:${isMine ? '12px 12px 2px 12px' : '12px 12px 12px 2px'};background:${isMine ? 'var(--green)' : 'var(--dark3)'};color:${isMine ? 'var(--dark)' : 'var(--white)'}">${msg.content}</div>
      </div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  }

  async function sendChatMessage() {
    if (!currentChatId) return;
    const input = document.getElementById('chat-input');
    const content = input.value.trim();
    if (!content) return;
    input.value = '';

    await _supabase.from('messages').insert({ chat_id: currentChatId, sender_role: 'customer', content, is_read: false });
    await loadChatMessages();
  }

  function subscribeToChatMessages() {
    if (chatChannel) _supabase.removeChannel(chatChannel);
    chatChannel = _supabase.channel('customer-chat-' + currentChatId)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${currentChatId}` },
        () => loadChatMessages())
      .subscribe();
  }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  init();
</script>
</body>
</html>
