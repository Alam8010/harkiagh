<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store — Harkiagh</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green:#00E676;--green-dark:#00C853;--dark:#0A0A0A;--dark2:#111111;--dark3:#1A1A1A;--border:rgba(255,255,255,0.07);--gray:#888888;--white:#FFFFFF;--danger:#FF3B3B;--warning:#FFB300; }
    html, body { min-height:100%; background:var(--dark); color:var(--white); font-family:'Barlow',sans-serif; }

    .navbar { position:sticky; top:0; z-index:100; height:64px; background:rgba(10,10,10,0.95); border-bottom:1px solid var(--border); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:space-between; padding:0 32px; }
    .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .nav-logo-icon { width:32px; height:32px; background:var(--green); border-radius:7px; display:flex; align-items:center; justify-content:center; }
    .nav-logo-icon svg { width:18px; height:18px; fill:var(--dark); }
    .nav-store-name { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--white); }
    .nav-right { display:flex; align-items:center; gap:12px; }
    .back-btn { padding:8px 16px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--white); font-family:'Barlow',sans-serif; font-size:13px; cursor:pointer; text-decoration:none; display:flex; align-items:center; gap:6px; transition:all 0.15s; }
    .back-btn:hover { background:rgba(255,255,255,0.06); }
    .back-btn svg { width:14px; height:14px; fill:currentColor; }
    .cart-btn { position:relative; width:40px; height:40px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.15s; }
    .cart-btn:hover { background:rgba(255,255,255,0.1); }
    .cart-btn svg { width:18px; height:18px; fill:var(--white); }
    .cart-count { position:absolute; top:-6px; right:-6px; background:var(--green); color:var(--dark); font-size:10px; font-weight:700; width:18px; height:18px; border-radius:50%; display:none; align-items:center; justify-content:center; }
    .cart-count.show { display:flex; }

    .store-hero { background:linear-gradient(135deg,rgba(0,230,118,0.06) 0%,transparent 60%); border-bottom:1px solid var(--border); padding:48px 32px; display:flex; align-items:center; gap:24px; }
    .hero-logo { width:80px; height:80px; border-radius:16px; object-fit:cover; background:rgba(255,255,255,0.05); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
    .hero-logo svg { width:36px; height:36px; fill:rgba(255,255,255,0.2); }
    .hero-logo img { width:100%; height:100%; object-fit:cover; }
    .hero-info { flex:1; }
    .hero-name { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:2px; margin-bottom:6px; }
    .hero-desc { font-size:14px; color:rgba(255,255,255,0.5); max-width:500px; line-height:1.6; margin-bottom:12px; }
    .hero-meta { display:flex; gap:20px; flex-wrap:wrap; }
    .hero-meta-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--gray); }
    .hero-meta-item svg { width:14px; height:14px; fill:var(--green); }

    .store-body { max-width:1200px; margin:0 auto; padding:32px; }
    .filter-row { display:flex; align-items:center; gap:12px; margin-bottom:28px; flex-wrap:wrap; }
    .search-box { flex:1; min-width:200px; display:flex; align-items:center; gap:10px; background:var(--dark2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; }
    .search-box svg { width:16px; height:16px; fill:var(--gray); flex-shrink:0; }
    .search-box input { background:transparent; border:none; outline:none; color:var(--white); font-family:'Barlow',sans-serif; font-size:14px; width:100%; }
    .search-box input::placeholder { color:var(--gray); }
    .cat-pills { display:flex; gap:8px; flex-wrap:wrap; }
    .cat-pill { padding:8px 16px; background:var(--dark2); border:1px solid var(--border); border-radius:100px; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; color:var(--gray); }
    .cat-pill:hover { color:var(--white); border-color:rgba(255,255,255,0.15); }
    .cat-pill.active { background:rgba(0,230,118,0.1); border-color:rgba(0,230,118,0.3); color:var(--green); }

    .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:18px; }
    .product-card { background:var(--dark2); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:border-color 0.15s,transform 0.15s; }
    .product-card:hover { border-color:rgba(255,255,255,0.14); transform:translateY(-3px); }
    .product-img { height:200px; overflow:hidden; position:relative; background:var(--dark3); }
    .product-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s; }
    .product-card:hover .product-img img { transform:scale(1.05); }
    .product-img-placeholder { height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; background:var(--dark3); }
    .product-img-placeholder svg { width:40px; height:40px; fill:rgba(255,255,255,0.08); }
    .out-of-stock-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; }
    .out-of-stock-label { background:rgba(255,59,59,0.9); color:var(--white); font-size:12px; font-weight:700; padding:6px 14px; border-radius:100px; letter-spacing:1px; text-transform:uppercase; }
    .product-info { padding:16px; }
    .product-cat { font-size:10px; font-weight:600; color:var(--green); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; }
    .product-name { font-size:15px; font-weight:600; margin-bottom:4px; }
    .product-desc { font-size:12px; color:var(--gray); line-height:1.5; margin-bottom:12px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .product-footer { display:flex; align-items:center; justify-content:space-between; }
    .product-price { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--green); letter-spacing:1px; }
    .add-to-cart-btn { padding:8px 14px; background:var(--green); color:var(--dark); border:none; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.5px; cursor:pointer; transition:background 0.15s; display:flex; align-items:center; gap:5px; }
    .add-to-cart-btn:hover { background:var(--green-dark); }
    .add-to-cart-btn svg { width:14px; height:14px; fill:var(--dark); }
    .add-to-cart-btn.added { background:rgba(0,230,118,0.2); color:var(--green); }

    .empty-state { grid-column:1/-1; text-align:center; padding:80px 20px; }
    .empty-icon { width:64px; height:64px; background:rgba(255,255,255,0.04); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
    .empty-icon svg { width:32px; height:32px; fill:var(--gray); }
    .empty-title { font-size:18px; font-weight:600; margin-bottom:8px; }
    .empty-sub { font-size:14px; color:var(--gray); }

    /* CART SIDEBAR */
    .cart-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; display:none; }
    .cart-overlay.open { display:block; }
    .cart-sidebar { position:fixed; right:0; top:0; bottom:0; width:380px; background:var(--dark2); border-left:1px solid var(--border); z-index:201; display:flex; flex-direction:column; transform:translateX(100%); transition:transform 0.3s ease; }
    .cart-sidebar.open { transform:translateX(0); }
    .cart-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .cart-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .cart-close { width:32px; height:32px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--gray); font-size:18px; }
    .cart-close:hover { color:var(--white); }
    .cart-items { flex:1; overflow-y:auto; padding:16px; }
    .cart-item { display:flex; gap:12px; padding:14px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
    .cart-item-img { width:56px; height:56px; border-radius:8px; object-fit:cover; background:var(--dark3); flex-shrink:0; }
    .cart-item-info { flex:1; min-width:0; }
    .cart-item-name { font-size:14px; font-weight:500; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cart-item-price { font-size:13px; color:var(--green); font-weight:600; }
    .cart-item-qty { display:flex; align-items:center; gap:10px; margin-top:8px; }
    .qty-btn { width:26px; height:26px; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:6px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--white); font-size:14px; transition:background 0.15s; }
    .qty-btn:hover { background:rgba(255,255,255,0.12); }
    .qty-num { font-size:14px; font-weight:600; min-width:20px; text-align:center; }
    .remove-item { color:var(--danger); font-size:12px; cursor:pointer; margin-left:auto; }
    .cart-empty { text-align:center; padding:60px 20px; color:var(--gray); font-size:14px; }
    .cart-footer { padding:20px 24px; border-top:1px solid var(--border); }
    .cart-total-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .cart-total-label { font-size:14px; color:var(--gray); }
    .cart-total-val { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--green); letter-spacing:1px; }
    .checkout-btn { width:100%; padding:14px; background:var(--green); color:var(--dark); border:none; border-radius:10px; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:background 0.15s; }
    .checkout-btn:hover { background:var(--green-dark); }

    /* CHECKOUT MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:300; display:none; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--dark2); border:1px solid var(--border); border-radius:16px; width:100%; max-width:460px; overflow:hidden; max-height:90vh; overflow-y:auto; }
    .modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--dark2); z-index:1; }
    .modal-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .modal-close { width:32px; height:32px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--gray); font-size:18px; }
    .modal-close:hover { color:var(--white); }
    .modal-body { padding:24px; }
    .modal-footer { padding:16px 24px; border-top:1px solid var(--border); }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:11px; font-weight:600; color:rgba(255,255,255,0.4); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
    .field input, .field textarea { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:12px 16px; font-family:'Barlow',sans-serif; font-size:14px; color:var(--white); outline:none; transition:border-color 0.2s; }
    .field textarea { resize:vertical; min-height:80px; }
    .field input::placeholder, .field textarea::placeholder { color:rgba(255,255,255,0.2); }
    .field input:focus, .field textarea:focus { border-color:rgba(0,230,118,0.4); background:rgba(0,230,118,0.04); }
    .submit-btn { width:100%; padding:13px; background:var(--green); color:var(--dark); border:none; border-radius:10px; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:background 0.15s; }
    .submit-btn:hover { background:var(--green-dark); }
    .submit-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .msg { padding:10px 14px; border-radius:8px; font-size:13px; font-weight:500; margin-bottom:14px; display:none; }
    .msg.error { background:rgba(255,59,59,0.1); border:1px solid rgba(255,59,59,0.2); color:var(--danger); display:block; }
    .msg.success { background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.2); color:var(--green); display:block; }

    .order-summary { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:20px; }
    .order-summary-title { font-size:12px; font-weight:600; color:var(--gray); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
    .order-summary-item { display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px; }
    .order-summary-item:last-child { margin-bottom:0; padding-top:8px; border-top:1px solid var(--border); font-weight:600; }
    .order-summary-item span:last-child { color:var(--green); }

    .success-state { text-align:center; padding:32px 24px; }
    .success-icon { width:64px; height:64px; background:rgba(0,230,118,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
    .success-icon svg { width:32px; height:32px; fill:var(--green); }
    .success-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; margin-bottom:8px; }
    .success-sub { font-size:14px; color:var(--gray); line-height:1.6; margin-bottom:24px; }
    .order-ref { display:inline-block; background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.2); border-radius:8px; padding:8px 16px; font-size:13px; font-weight:600; color:var(--green); letter-spacing:1px; margin-bottom:24px; }
    .continue-btn { display:inline-block; padding:12px 24px; background:var(--green); color:var(--dark); border:none; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:background 0.15s; }
    .continue-btn:hover { background:var(--green-dark); }

    #loading { position:fixed; inset:0; background:var(--dark); display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:16px; }
    .spinner { width:32px; height:32px; border:2px solid rgba(255,255,255,0.1); border-top-color:var(--green); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    @media (max-width:768px) {
      .navbar { padding:0 16px; }
      .store-hero { padding:32px 16px; flex-direction:column; align-items:flex-start; }
      .store-body { padding:20px 16px; }
      .cart-sidebar { width:100%; }
    }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<nav class="navbar">
  <a class="nav-logo" href="stores.html">
    <div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg></div>
    <span class="nav-store-name" id="nav-store-name">Loading...</span>
  </a>
  <div class="nav-right">
    <a class="back-btn" href="stores.html">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      All Stores
    </a>
    <div class="cart-btn" onclick="openCart()">
      <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.1 17 7 17h11v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H18c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
      <div class="cart-count" id="cart-count">0</div>
    </div>
  </div>
</nav>

<div class="store-hero" id="store-hero" style="display:none">
  <div class="hero-logo" id="hero-logo">
    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2z"/></svg>
  </div>
  <div class="hero-info">
    <div class="hero-name" id="hero-name"></div>
    <div class="hero-desc" id="hero-desc"></div>
    <div class="hero-meta" id="hero-meta"></div>
  </div>
</div>

<div class="store-body">
  <div class="filter-row">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="search-input" placeholder="Search products..." oninput="filterProducts()" />
    </div>
    <div class="cat-pills" id="cat-pills"></div>
  </div>
  <div class="products-grid" id="products-grid"></div>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <div class="cart-title">Your Cart</div>
    <div class="cart-close" onclick="closeCart()">×</div>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-total-row">
      <div class="cart-total-label">Total</div>
      <div class="cart-total-val" id="cart-total">PKR 0</div>
    </div>
    <button class="checkout-btn" onclick="openCheckout()">Proceed to Order</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="checkout-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="checkout-modal-title">Place Your Order</div>
      <div class="modal-close" onclick="closeCheckout()">×</div>
    </div>
    <div id="checkout-form-view">
      <div class="modal-body">
        <div class="order-summary" id="order-summary"></div>
        <div class="msg" id="checkout-msg"></div>
        <div class="field"><label>Full Name</label><input type="text" id="cust-name" placeholder="Your full name" /></div>
        <div class="field"><label>Phone Number</label><input type="tel" id="cust-phone" placeholder="03XX-XXXXXXX" /></div>
        <div class="field"><label>Delivery Address</label><textarea id="cust-address" placeholder="House/flat number, street, area, city..."></textarea></div>
        <div class="field"><label>Order Notes (optional)</label><input type="text" id="cust-notes" placeholder="Any special instructions?" /></div>
      </div>
      <div class="modal-footer">
        <button class="submit-btn" id="place-order-btn" onclick="placeOrder()">Confirm Order</button>
      </div>
    </div>
    <div id="checkout-success-view" style="display:none">
      <div class="success-state">
        <div class="success-icon"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
        <div class="success-title">Order Placed!</div>
        <div class="success-sub">Thank you! The store owner will contact you soon on your phone number to confirm delivery.</div>
        <div class="order-ref" id="order-ref-display"></div>
        <br/>
        <button class="continue-btn" onclick="closeCheckout(); resetCart();">Continue Shopping</button>
      </div>
    </div>
  </div>
</div>

<script src="../js/supabase.js"></script>
<script>
  let store = null;
  let allProducts = [];
  let cart = [];
  let activeCategory = 'All';

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    if (!slug) { window.location.href = 'stores.html'; return; }

    const { data: storeData } = await _supabase.from('stores').select('*').eq('slug', slug).eq('is_active', true).single();
    if (!storeData) { window.location.href = 'stores.html'; return; }
    store = storeData;

    document.title = `${store.name} — Harkiagh`;
    document.getElementById('nav-store-name').textContent = store.name;

    // Hero
    document.getElementById('store-hero').style.display = 'flex';
    document.getElementById('hero-name').textContent = store.name;
    document.getElementById('hero-desc').textContent = store.description || '';
    if (store.logo_url) {
      document.getElementById('hero-logo').innerHTML = `<img src="${store.logo_url}" alt="${store.name}" />`;
    }
    let metaHtml = '';
    if (store.city) metaHtml += `<div class="hero-meta-item"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>${store.city}</div>`;
    if (store.category) metaHtml += `<div class="hero-meta-item"><svg viewBox="0 0 24 24"><path d="M12 2l-5.5 9h11zM17.5 13c-2.49 0-4.5 2.01-4.5 4.5S15.01 22 17.5 22 22 19.99 22 17.5 19.99 13 17.5 13zM3 21.5h8v-8H3v8z"/></svg>${store.category}</div>`;
    document.getElementById('hero-meta').innerHTML = metaHtml;

    const { data: products } = await _supabase.from('products').select('*').eq('store_id', store.id).eq('is_active', true).order('created_at', { ascending: false });
    allProducts = products || [];

    // Category pills
    const cats = ['All', ...new Set(allProducts.map(p => p.category).filter(Boolean))];
    document.getElementById('cat-pills').innerHTML = cats.map(c =>
      `<div class="cat-pill ${c === 'All' ? 'active' : ''}" onclick="setCategory('${c}')">${c}</div>`
    ).join('');

    renderProducts(allProducts);
    document.getElementById('loading').style.display = 'none';
  }

  function setCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.toggle('active', p.textContent === cat));
    filterProducts();
  }

  function filterProducts() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allProducts.filter(p => {
      const matchCat = activeCategory === 'All' || p.category === activeCategory;
      const matchQ = !q || p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q);
      return matchCat && matchQ;
    });
    renderProducts(filtered);
  }

  function renderProducts(products) {
    const grid = document.getElementById('products-grid');
    if (!products.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg></div><div class="empty-title">No products found</div><div class="empty-sub">Try a different search or category.</div></div>`;
      return;
    }
    grid.innerHTML = products.map(p => {
      const inCart = cart.find(c => c.id === p.id);
      const outOfStock = p.stock !== null && p.stock !== undefined && p.stock <= 0;
      return `
        <div class="product-card">
          ${p.image_url
            ? `<div class="product-img">${outOfStock ? '<div class="out-of-stock-overlay"><div class="out-of-stock-label">Out of Stock</div></div>' : ''}<img src="${p.image_url}" alt="${p.name}" /></div>`
            : `<div class="product-img-placeholder"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></div>`
          }
          <div class="product-info">
            ${p.category ? `<div class="product-cat">${p.category}</div>` : ''}
            <div class="product-name">${p.name}</div>
            ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
            <div class="product-footer">
              <div class="product-price">PKR ${Number(p.price).toLocaleString()}</div>
              ${outOfStock
                ? `<div style="font-size:12px;color:var(--danger)">Out of stock</div>`
                : `<button class="add-to-cart-btn ${inCart ? 'added' : ''}" onclick="addToCart('${p.id}')">
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    ${inCart ? 'Added' : 'Add'}
                  </button>`
              }
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function addToCart(productId) {
    const product = allProducts.find(p => p.id === productId);
    if (!product) return;
    const existing = cart.find(c => c.id === productId);
    if (existing) {
      existing.qty++;
    } else {
      cart.push({ ...product, qty: 1 });
    }
    updateCartUI();
    filterProducts();
    // Brief flash of cart
    document.getElementById('cart-sidebar').classList.add('open');
    document.getElementById('cart-overlay').classList.add('open');
  }

  function removeFromCart(productId) {
    cart = cart.filter(c => c.id !== productId);
    updateCartUI();
    filterProducts();
  }

  function changeQty(productId, delta) {
    const item = cart.find(c => c.id === productId);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) removeFromCart(productId);
    else updateCartUI();
  }

  function updateCartUI() {
    const count = cart.reduce((s, c) => s + c.qty, 0);
    const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
    const countEl = document.getElementById('cart-count');
    countEl.textContent = count;
    countEl.classList.toggle('show', count > 0);

    document.getElementById('cart-total').textContent = `PKR ${total.toLocaleString()}`;
    document.getElementById('cart-footer').style.display = cart.length ? 'block' : 'none';

    const itemsEl = document.getElementById('cart-items');
    if (!cart.length) {
      itemsEl.innerHTML = `<div class="cart-empty">Your cart is empty.<br/>Add some products!</div>`;
      return;
    }
    itemsEl.innerHTML = cart.map(item => `
      <div class="cart-item">
        ${item.image_url ? `<img class="cart-item-img" src="${item.image_url}" alt="${item.name}" />` : `<div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:rgba(255,255,255,0.1)"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2z"/></svg></div>`}
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">PKR ${Number(item.price).toLocaleString()}</div>
          <div class="cart-item-qty">
            <div class="qty-btn" onclick="changeQty('${item.id}', -1)">−</div>
            <div class="qty-num">${item.qty}</div>
            <div class="qty-btn" onclick="changeQty('${item.id}', 1)">+</div>
            <div class="remove-item" onclick="removeFromCart('${item.id}')">Remove</div>
          </div>
        </div>
      </div>
    `).join('');
  }

  function openCart() {
    document.getElementById('cart-sidebar').classList.add('open');
    document.getElementById('cart-overlay').classList.add('open');
    if (!cart.length) {
      document.getElementById('cart-items').innerHTML = `<div class="cart-empty">Your cart is empty.<br/>Add some products!</div>`;
    }
  }

  function closeCart() {
    document.getElementById('cart-sidebar').classList.remove('open');
    document.getElementById('cart-overlay').classList.remove('open');
  }

  function openCheckout() {
    closeCart();
    const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
    const summaryHtml = `
      <div class="order-summary-title">Order Summary</div>
      ${cart.map(item => `<div class="order-summary-item"><span>${item.name} × ${item.qty}</span><span>PKR ${(item.price * item.qty).toLocaleString()}</span></div>`).join('')}
      <div class="order-summary-item"><span>Total</span><span>PKR ${total.toLocaleString()}</span></div>
    `;
    document.getElementById('order-summary').innerHTML = summaryHtml;
    document.getElementById('checkout-form-view').style.display = 'block';
    document.getElementById('checkout-success-view').style.display = 'none';
    document.getElementById('checkout-modal-title').textContent = 'Place Your Order';
    document.getElementById('checkout-msg').className = 'msg';
    document.getElementById('checkout-modal').classList.add('open');
  }

  function closeCheckout() {
    document.getElementById('checkout-modal').classList.remove('open');
  }

  async function placeOrder() {
    const name = document.getElementById('cust-name').value.trim();
    const phone = document.getElementById('cust-phone').value.trim();
    const address = document.getElementById('cust-address').value.trim();
    const notes = document.getElementById('cust-notes').value.trim();

    if (!name || !phone || !address) {
      showCheckoutMsg('Please fill in your name, phone number and address.', 'error');
      return;
    }

    const btn = document.getElementById('place-order-btn');
    btn.disabled = true;
    btn.textContent = 'Placing Order...';

    const total = cart.reduce((s, c) => s + c.price * c.qty, 0);

    const { data: order, error: orderError } = await _supabase.from('orders').insert({
      store_id: store.id,
      customer_name: name,
      customer_phone: phone,
      customer_address: address,
      notes: notes || null,
      total_amount: total,
      status: 'pending'
    }).select().single();

    if (orderError) {
      showCheckoutMsg('Something went wrong. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Confirm Order';
      return;
    }

    const orderItems = cart.map(item => ({
      order_id: order.id,
      product_id: item.id,
      product_name: item.name,
      product_price: item.price,
      quantity: item.qty,
      subtotal: item.price * item.qty
    }));

    await _supabase.from('order_items').insert(orderItems);

    // Show success
    document.getElementById('order-ref-display').textContent = `Order #${order.id.slice(0,8).toUpperCase()}`;
    document.getElementById('checkout-form-view').style.display = 'none';
    document.getElementById('checkout-success-view').style.display = 'block';
    document.getElementById('checkout-modal-title').textContent = 'Order Confirmed!';
    btn.disabled = false;
    btn.textContent = 'Confirm Order';
  }

  function resetCart() {
    cart = [];
    updateCartUI();
    filterProducts();
  }

  function showCheckoutMsg(text, type) {
    const el = document.getElementById('checkout-msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  init();
  updateCartUI();
</script>
</body>
</html>
